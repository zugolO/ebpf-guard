coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%   # fail if overall coverage drops more than 2%
    patch:
      default:
        target: 70%     # new code in a PR must be at least 70% covered
        threshold: 5%

comment:
  layout: "reach,diff,flags,components"
  behavior: default

component_management:
  individual_components:
    - component_id: correlator
      name: "correlator"
      paths:
        - internal/correlator/**
      target: 90%
      threshold: 2%
    - component_id: enforcer
      name: "enforcer"
      paths:
        - internal/enforcer/**
      target: 85%
      threshold: 2%
    - component_id: exporter
      name: "exporter"
      paths:
        - internal/exporter/**
      target: 85%
      threshold: 2%
    - component_id: store
      name: "store"
      paths:
        - internal/store/**
      target: 80%
      threshold: 2%
    - component_id: profiler
      name: "profiler"
      paths:
        - internal/profiler/**
      target: 80%
      threshold: 2%
