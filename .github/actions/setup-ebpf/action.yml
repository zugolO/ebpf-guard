name: "Setup eBPF toolchain"
description: >-
  Installs clang/llvm, libbpf and bpftool, then runs `make generate` to produce
  the bpf2go bindings (bpf.*Objects) and bpf/vmlinux.h from the runner's kernel
  BTF. Required before any `go build`/`go test` because the generated bindings
  are not committed to the repository.

runs:
  using: composite
  steps:
    - name: Install eBPF build toolchain
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        # clang/llvm for bpf2go, libbpf headers, kernel headers for asm/types.
        sudo apt-get install -y clang llvm libbpf-dev linux-headers-"$(uname -r)" || \
          sudo apt-get install -y clang llvm libbpf-dev

        # bpftool is needed to dump kernel BTF into bpf/vmlinux.h.
        # NOTE: the Ubuntu `bpftool` package is only a wrapper that execs a
        # kernel-specific binary (linux-tools-<kver>), which is not published for
        # the runner's azure kernel — the wrapper then exits non-zero. So install
        # linux-tools-generic and use its real, self-contained binary directly;
        # `bpftool btf dump` reads /sys/kernel/btf/vmlinux and is version-tolerant.
        sudo apt-get install -y linux-tools-common linux-tools-generic || true
        real_bpftool="$(ls -1 /usr/lib/linux-tools/*/bpftool /usr/lib/linux-tools-*/bpftool 2>/dev/null | sort -V | tail -1 || true)"
        if [ -z "${real_bpftool}" ]; then
          echo "::error::bpftool binary not found under /usr/lib/linux-tools* after installing linux-tools-generic" >&2
          exit 1
        fi
        sudo ln -sf "${real_bpftool}" /usr/local/bin/bpftool
        echo "Using bpftool: ${real_bpftool}"
        /usr/local/bin/bpftool version
        clang --version | head -1

    - name: Verify kernel BTF is available
      shell: bash
      run: |
        if [ ! -f /sys/kernel/btf/vmlinux ]; then
          echo "::error::/sys/kernel/btf/vmlinux not found on this runner — cannot generate vmlinux.h" >&2
          exit 1
        fi

    - name: Generate eBPF bindings (make generate)
      shell: bash
      run: make generate
