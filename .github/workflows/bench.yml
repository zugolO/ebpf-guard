name: Benchmarks

# Save baseline on every push to main.
# Compare on every PR and block if any benchmark regresses by >+15% (p<0.05).
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  GOTOOLCHAIN: local
  # Performance-critical packages that are pure Go (no kernel/BPF required).
  BENCH_PKGS: ./internal/correlator/... ./internal/profiler/...
  # benchstat threshold in percent — job fails when exceeded (p<0.05 required).
  REGRESSION_THRESHOLD: '15'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Push to main → record a fresh baseline artifact so PRs have something to
  # compare against.  The artifact is overwritten on every qualifying push, so
  # "bench-baseline" always reflects the tip of main.
  # ─────────────────────────────────────────────────────────────────────────────
  save-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Save Baseline (main)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run baseline benchmarks
        run: |
          go test -bench=. -benchmem -count=6 -run='^$' ${{ env.BENCH_PKGS }} \
            | tee bench-baseline.txt

      - name: Compute baseline coverage
        run: |
          go test -short -coverprofile=coverage-baseline.out ./... 2>/dev/null || true
          go tool cover -func=coverage-baseline.out \
            | awk '/^total:/{printf "%.1f\n", $3+0}' \
            > coverage-baseline.txt
          echo "Baseline coverage: $(cat coverage-baseline.txt)%"

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline
          path: |
            bench-baseline.txt
            coverage-baseline.txt
          # Keep baseline for 90 days; overwrite any artifact from a previous run.
          retention-days: 90
          overwrite: true

  # ─────────────────────────────────────────────────────────────────────────────
  # PR → download the main baseline, run benchmarks on HEAD, compare with
  # benchstat, fail if any metric regresses by >+15% (p<0.05), and post a
  # sticky comment with the full diff.
  # ─────────────────────────────────────────────────────────────────────────────
  bench-compare:
    if: github.event_name == 'pull_request'
    name: Benchmark Regression Gate (+${{ env.REGRESSION_THRESHOLD }}% threshold)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # required to post/update the PR comment

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      # Download the baseline that was saved by the save-baseline job on main.
      # continue-on-error keeps the workflow alive when no baseline exists yet
      # (e.g. first PR ever); the compare step handles the missing file.
      - name: Download baseline from main
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: bench.yml
          branch: main
          name: bench-baseline
          path: .
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run PR benchmarks
        run: |
          go test -bench=. -benchmem -count=6 -run='^$' ${{ env.BENCH_PKGS }} \
            | tee bench-pr.txt

      - name: Compute PR coverage
        run: |
          go test -short -coverprofile=coverage-pr.out ./... 2>/dev/null || true
          go tool cover -func=coverage-pr.out \
            | awk '/^total:/{printf "%.1f\n", $3+0}' \
            > coverage-pr.txt
          echo "PR coverage: $(cat coverage-pr.txt)%"

      - name: Compute coverage delta
        id: coverage
        run: |
          pr_cov=$(cat coverage-pr.txt 2>/dev/null || echo "")
          base_cov=$(cat coverage-baseline.txt 2>/dev/null || echo "")

          if [ -z "$pr_cov" ]; then
            echo "coverage_line=⚪ Coverage: _not available_" >> "$GITHUB_OUTPUT"
          elif [ -z "$base_cov" ]; then
            echo "coverage_line=📊 Coverage: **${pr_cov}%** (no baseline)" >> "$GITHUB_OUTPUT"
          else
            delta=$(awk "BEGIN{printf \"%.1f\", $pr_cov - $base_cov}")
            if awk "BEGIN{exit !($delta >= 0)}"; then
              arrow="▲"
            else
              arrow="▼"
            fi
            echo "coverage_line=📊 Coverage: **${pr_cov}%** (${arrow}${delta}% vs main ${base_cov}%)" >> "$GITHUB_OUTPUT"
          fi

      # Produce bench-diff.txt and bench-regressions.txt; exit 1 on regression.
      - name: Compare and enforce threshold
        id: compare
        run: |
          set -euo pipefail

          if [ ! -f bench-baseline.txt ]; then
            echo "::warning::No baseline artifact found — skipping regression check."
            echo "result=no-baseline" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          benchstat bench-baseline.txt bench-pr.txt | tee bench-diff.txt

          python3 - <<'PYEOF'
          import sys, re

          THRESHOLD = float("${{ env.REGRESSION_THRESHOLD }}")
          regressions = []

          with open("bench-diff.txt") as f:
              for line in f:
                  # benchstat output: "BenchmarkFoo  1.00ms ± 1%  1.20ms ± 2%  +20.00%  (p=0.002 n=6+6)"
                  # Only flag regressions that are statistically significant (p < 0.05).
                  m_delta = re.search(r'\+(\d+(?:\.\d+)?)%', line)
                  m_pval  = re.search(r'p=(\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)', line)
                  if not m_delta:
                      continue
                  delta = float(m_delta.group(1))
                  pval  = float(m_pval.group(1)) if m_pval else 1.0
                  if delta > THRESHOLD and pval < 0.05:
                      regressions.append(line.rstrip())

          with open("bench-regressions.txt", "w") as f:
              f.write("\n".join(regressions))

          if regressions:
              print(f"FAIL: {len(regressions)} benchmark(s) regressed by >{THRESHOLD:.0f}% (p<0.05):")
              for r in regressions:
                  print(f"  {r}")
              sys.exit(1)

          print(f"PASS: no benchmarks regressed by >{THRESHOLD:.0f}% (p<0.05)")
          PYEOF

          echo "result=ok" >> "$GITHUB_OUTPUT"

      # Always post/update the sticky comment so reviewers see current results
      # even when the job has already failed.
      - name: Post benchmark comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- ebpf-guard-bench-regression -->';

            // Build the diff block (may not exist when no baseline).
            let diffSection = '';
            if (fs.existsSync('bench-diff.txt')) {
              const diff = fs.readFileSync('bench-diff.txt', 'utf8').trim();
              diffSection = `\`\`\`\n${diff}\n\`\`\``;
            }

            // Build the regression callout.
            let regressSection = '';
            const regressionsExist =
              fs.existsSync('bench-regressions.txt') &&
              fs.readFileSync('bench-regressions.txt', 'utf8').trim().length > 0;

            if (regressionsExist) {
              const regressions = fs.readFileSync('bench-regressions.txt', 'utf8').trim();
              regressSection = [
                '',
                '> [!CAUTION]',
                '> **Regressions >+${{ env.REGRESSION_THRESHOLD }}% (p<0.05) detected — merge is blocked.**',
                '',
                '```',
                regressions,
                '```',
              ].join('\n');
            }

            // Determine the overall status badge.
            let status;
            if (regressionsExist) {
              status = '🔴 **FAIL** — performance regression detected';
            } else if (diffSection) {
              status = '🟢 **PASS** — no regressions above the +${{ env.REGRESSION_THRESHOLD }}% threshold';
            } else {
              status = '⚪ **SKIP** — no baseline artifact yet; will be saved after first push to `main`';
            }

            const body = [
              MARKER,
              '## Benchmark Regression Report',
              '',
              status,
              '',
              '${{ steps.coverage.outputs.coverage_line }}',
              '',
              diffSection,
              regressSection,
              '',
              '<sub>Threshold: +${{ env.REGRESSION_THRESHOLD }}% · Significance: p<0.05 · Runs: 6 · ' +
              'Packages: `correlator`, `profiler` · ' +
              `Commit: \`${{ github.event.pull_request.head.sha }}\`</sub>`,
            ].join('\n');

            // Update existing comment or create a new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-pr${{ github.event.pull_request.number }}
          path: |
            bench-pr.txt
            bench-baseline.txt
            bench-diff.txt
            bench-regressions.txt
            coverage-pr.txt
            coverage-baseline.txt
          retention-days: 30
