name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Nightly at 02:00 UTC — runs slow load / performance E2E tests
    - cron: '0 2 * * *'

env:
  CLANG_VERSION: '15'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Use the system-installed Go toolchain instead of downloading one via the
  # module proxy. The downloaded toolchain is a stripped module archive that
  # omits several compiled tools (covdata, addr2line, nm, …) and causes
  # "go: no such tool covdata" failures during coverage runs.
  GOTOOLCHAIN: local

jobs:
  api-spec:
    name: OpenAPI Spec Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate api/openapi.yaml structure
      run: make api-docs

    - name: Verify spec is committed (diff check)
      run: |
        # Ensure the spec file is tracked by git (not accidentally excluded).
        git ls-files --error-unmatch api/openapi.yaml
        echo "api/openapi.yaml is tracked in git ✓"

  # compile is the first gate — catches broken commits before they reach main.
  # go build ./... (not just ./cmd/ebpf-guard) ensures every package compiles,
  # including internal/enforcer, internal/profiler, etc. This would have caught
  # the unused-import regression (P0-1 in AUDIT-PERF-2026-06-13.md).
  #
  # IMPORTANT — branch protection setup (GitHub repo Settings → Branches):
  #   1. Add a branch protection rule for the "main" branch.
  #   2. Enable "Require status checks to pass before merging".
  #   3. Search for and select "Compile" as a required status check.
  #   4. Repeat for "Lint", "Test", and "Rule Fixture Tests".
  # This ensures no non-compiling or non-vetting commit can land on main.
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Generate eBPF bindings
      uses: ./.github/actions/setup-ebpf

    - name: Build all packages
      run: go build ./...

    - name: Run go vet
      run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [compile]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }}
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Install golangci-lint
      # Build from source with the project's own Go 1.25 toolchain so the
      # linter binary supports Go 1.25 language features. Pre-compiled
      # release binaries may be built with an older toolchain and refuse
      # to lint modules that declare go 1.25.
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

    - name: Run golangci-lint
      run: golangci-lint run --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [compile]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      # -short skips long-running e2e/performance tests that have their own
      # dedicated job and require hardware not available on shared CI runners.
      run: go test -v -race -short -coverprofile=coverage.out ./...

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        fail_ci_if_error: true
        threshold: 2%
        fail_ci_if_coverage_drops: true

  # BTF fallback compatibility tests — verify the 3-strategy resolution logic
  # works correctly for each scenario without requiring a real kernel change.
  # Full kernel-level testing (5.4, 5.10) runs in the nightly VM matrix defined
  # in .github/workflows/kernel-compat.yml using qemu/microvm runners.
  btf-compat:
    name: BTF Fallback (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: local_btf_present
            description: "kernel-embedded BTF available (normal kernel 5.8+)"
          - scenario: btf_hub_cache_hit
            description: "BTF hub cache file pre-populated (air-gapped / initContainer)"
          - scenario: reduced_features_fallback
            description: "no BTF available, fallback_reduced_features=true"
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run BTF fallback unit tests (${{ matrix.scenario }})
      run: go test -v -race -run TestBTF ./internal/bpf/...

  rule-tests:
    name: Rule Fixture Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run rule fixture tests
      run: go test -v -race ./tests/... -timeout 5m

    - name: Run rule fixture tests with JUnit output
      run: |
        go build -o build/ebpf-guard ./cmd/ebpf-guard
        ./build/ebpf-guard rules check ./tests/rules/ --rules ./rules/ --junit rule-test-results.xml || true

    - name: Upload rule test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rule-test-results
        path: rule-test-results.xml

  race-detector:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run race detector tests
      timeout-minutes: 15
      run: go test -race ./internal/exporter/... ./internal/profiler/... -count=2 -timeout=10m

    - name: Run stress tests
      timeout-minutes: 10
      run: go test -race ./internal/exporter/... ./internal/profiler/... -count=3 -run "Stress|Concurrent|Race" -timeout=8m

  benchmark-regression:
    name: Benchmark Regression Gate
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@latest

    - name: Run benchmarks on HEAD
      run: |
        go test -bench=. -benchmem -count=3 -run='^$' ./internal/correlator/... | tee bench_new.txt

    - name: Find baseline commit
      id: baseline
      run: |
        set -e
        if [ -n "$GITHUB_BASE_REF" ]; then
          # Pull request: compare against the merge base of the target branch.
          git fetch origin "$GITHUB_BASE_REF"
          BASE=$(git merge-base HEAD "origin/$GITHUB_BASE_REF")
        else
          # Direct push to main/develop: compare against the parent commit.
          BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
        fi
        echo "sha=$BASE" >> "$GITHUB_OUTPUT"
        echo "Baseline commit: $BASE"

    - name: Checkout baseline into worktree
      run: git worktree add /tmp/bench-base "${{ steps.baseline.outputs.sha }}"

    - name: Run benchmarks on baseline
      run: |
        cd /tmp/bench-base
        go mod download
        go test -bench=. -benchmem -count=3 -run='^$' ./internal/correlator/... | tee "$GITHUB_WORKSPACE/bench_old.txt"

    - name: Remove worktree
      if: always()
      run: git worktree remove --force /tmp/bench-base || true

    - name: Compare and gate on regressions
      run: |
        benchstat bench_old.txt bench_new.txt | tee bench_comparison.txt
        echo ""
        echo "=== Regression check (threshold: 10%) ==="
        python3 - <<'PYEOF'
        import sys, re

        THRESHOLD = 10.0
        regressions = []

        with open("bench_comparison.txt") as f:
            for line in f:
                m = re.search(r'\+(\d+(?:\.\d+)?)%', line)
                if m and float(m.group(1)) > THRESHOLD:
                    regressions.append(line.rstrip())

        if regressions:
            print(f"FAIL: {len(regressions)} benchmark(s) regressed by more than {THRESHOLD:.0f}%:")
            for r in regressions:
                print(f"  {r}")
            sys.exit(1)

        print(f"PASS: No benchmarks regressed by more than {THRESHOLD:.0f}%")
        PYEOF

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          bench_new.txt
          bench_old.txt
          bench_comparison.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Set up QEMU
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: Build binary
      env:
        GOOS: linux
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 0
      run: |
        make build
        mv build/ebpf-guard ebpf-guard-linux-${{ matrix.arch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-guard-linux-${{ matrix.arch }}
        path: ebpf-guard-linux-${{ matrix.arch }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: false
        tags: ebpf-guard:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: '3.14.0'

    - name: Lint Helm chart
      run: |
        helm lint deploy/helm/ebpf-guard
        helm lint deploy/helm/ebpf-guard -f deploy/helm/ebpf-guard/values-secure.yaml
        helm template ebpf-guard deploy/helm/ebpf-guard > /dev/null

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Run gosec
      uses: securego/gosec@master
      with:
        args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload gosec results
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('gosec-results.sarif') != ''
      with:
        sarif_file: 'gosec-results.sarif'

    - name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  performance:
    name: Performance Regression Test
    runs-on: ubuntu-latest
    # Throughput targets (10k ev/sec) require dedicated hardware unavailable on
    # shared GitHub runners; treat this job as informational, not blocking.
    continue-on-error: true
    strategy:
      matrix:
        go-version: ['1.25.x']
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run performance tests
      run: |
        go test -v ./e2e/... -run "TestPerformanceRegression|TestShardedLockContention|TestMemoryProfileAtLoad" -timeout 10m

    - name: Run benchmarks
      run: |
        go test -bench=BenchmarkCorrelationEngine -benchtime=10s ./e2e/...
        go test -bench=BenchmarkShardedBufferContention -benchtime=10s ./e2e/...
        go test -bench=BenchmarkCorrelationEngineParallel -benchtime=10s ./e2e/...

    - name: Run profiler benchmarks (Sprint 13.2)
      run: |
        echo "=== ProcessEvent Benchmark (target p99 < 10µs) ==="
        go test -bench=BenchmarkProcessEvent -benchtime=5s ./internal/profiler/...
        echo "=== IsLearningComplete Benchmark (atomic.Bool fast path) ==="
        go test -bench=BenchmarkIsLearningComplete -benchtime=5s ./internal/profiler/...
        echo "=== Parallel Processing Benchmark ==="
        go test -bench=BenchmarkProcessEventParallel -benchtime=5s ./internal/profiler/...

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results-go${{ matrix.go-version }}
        path: |
          /tmp/ebpf-guard-*.prof
          /tmp/performance-*.json

  # E2E fast suite — runs on every PR and push.
  # Covers integration, contention, and anomaly tests that finish in < 5 minutes.
  # Uses testcontainers-go; Docker daemon is available on ubuntu-latest runners.
  e2e-fast:
    name: E2E Fast Suite
    runs-on: ubuntu-latest
    needs: [test]
    env:
      RUN_E2E_TESTS: "1"
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run fast E2E tests
      timeout-minutes: 10
      run: |
        go test -v -timeout=8m ./e2e/... \
          -run "TestIntegration|TestContention|TestAnomaly"

  # E2E load suite — runs only on the nightly schedule.
  # Covers sustained throughput (250k ev/s) and memory/CPU regression tests
  # that require dedicated hardware and take up to 30 minutes.
  e2e-load:
    name: E2E Load Suite
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      RUN_E2E_TESTS: "1"
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run load / performance E2E tests
      timeout-minutes: 35
      run: |
        go test -v -timeout=30m ./e2e/... \
          -run "TestLoad|TestPerformance|TestSustained"

  wasm-plugins:
    name: WASM Plugin Conformance
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run WASM conformance tests
      run: go test -v -run TestWASMConformance ./internal/wasm/... -timeout 60s

    - name: Build agent
      run: go build -o build/ebpf-guard ./cmd/ebpf-guard/

    - name: Validate example plugins (ABI check + dry-run)
      run: |
        ./build/ebpf-guard plugins validate internal/wasm/testdata/ --dry-run
