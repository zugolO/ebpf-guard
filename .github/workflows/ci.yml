name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  CLANG_VERSION: '15'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }}
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      # -short skips long-running e2e/performance tests that have their own
      # dedicated job and require hardware not available on shared CI runners.
      run: go test -v -race -short -coverprofile=coverage.out ./...

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        fail_ci_if_error: false

  race-detector:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run race detector tests
      timeout-minutes: 15
      run: go test -race ./internal/exporter/... ./internal/profiler/... -count=2 -timeout=10m

    - name: Run stress tests
      timeout-minutes: 10
      run: go test -race ./internal/exporter/... ./internal/profiler/... -count=3 -run "Stress|Concurrent|Race" -timeout=8m

  benchmark-regression:
    name: Benchmark Regression Gate
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@latest

    - name: Run benchmarks on HEAD
      run: |
        go test -bench=. -benchmem -count=3 -run='^$' ./internal/correlator/... | tee bench_new.txt

    - name: Find baseline commit
      id: baseline
      run: |
        set -e
        if [ -n "$GITHUB_BASE_REF" ]; then
          # Pull request: compare against the merge base of the target branch.
          git fetch origin "$GITHUB_BASE_REF"
          BASE=$(git merge-base HEAD "origin/$GITHUB_BASE_REF")
        else
          # Direct push to main/develop: compare against the parent commit.
          BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
        fi
        echo "sha=$BASE" >> "$GITHUB_OUTPUT"
        echo "Baseline commit: $BASE"

    - name: Checkout baseline into worktree
      run: git worktree add /tmp/bench-base "${{ steps.baseline.outputs.sha }}"

    - name: Run benchmarks on baseline
      run: |
        cd /tmp/bench-base
        go mod download
        go test -bench=. -benchmem -count=3 -run='^$' ./internal/correlator/... | tee "$GITHUB_WORKSPACE/bench_old.txt"

    - name: Remove worktree
      if: always()
      run: git worktree remove --force /tmp/bench-base || true

    - name: Compare and gate on regressions
      run: |
        benchstat bench_old.txt bench_new.txt | tee bench_comparison.txt
        echo ""
        echo "=== Regression check (threshold: 15%) ==="
        python3 - <<'PYEOF'
        import sys, re

        THRESHOLD = 15.0
        regressions = []

        with open("bench_comparison.txt") as f:
            for line in f:
                m = re.search(r'\+(\d+(?:\.\d+)?)%', line)
                if m and float(m.group(1)) > THRESHOLD:
                    regressions.append(line.rstrip())

        if regressions:
            print(f"FAIL: {len(regressions)} benchmark(s) regressed by more than {THRESHOLD:.0f}%:")
            for r in regressions:
                print(f"  {r}")
            sys.exit(1)

        print(f"PASS: No benchmarks regressed by more than {THRESHOLD:.0f}%")
        PYEOF

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          bench_new.txt
          bench_old.txt
          bench_comparison.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Set up QEMU
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: Build binary
      env:
        GOOS: linux
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 0
      run: |
        make build
        mv build/ebpf-guard ebpf-guard-linux-${{ matrix.arch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-guard-linux-${{ matrix.arch }}
        path: ebpf-guard-linux-${{ matrix.arch }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: false
        tags: ebpf-guard:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: '3.14.0'

    - name: Lint Helm chart
      run: |
        helm lint deploy/helm/ebpf-guard
        helm lint deploy/helm/ebpf-guard -f deploy/helm/ebpf-guard/values-secure.yaml
        helm template ebpf-guard deploy/helm/ebpf-guard > /dev/null

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run gosec
      uses: securego/gosec@master
      with:
        args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload gosec results
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('gosec-results.sarif') != ''
      with:
        sarif_file: 'gosec-results.sarif'

  performance:
    name: Performance Regression Test
    runs-on: ubuntu-latest
    # Throughput targets (10k ev/sec) require dedicated hardware unavailable on
    # shared GitHub runners; treat this job as informational, not blocking.
    continue-on-error: true
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run performance tests
      run: |
        go test -v ./e2e/... -run "TestPerformanceRegression|TestShardedLockContention|TestMemoryProfileAtLoad" -timeout 10m

    - name: Run benchmarks
      run: |
        go test -bench=BenchmarkCorrelationEngine -benchtime=10s ./e2e/...
        go test -bench=BenchmarkShardedBufferContention -benchtime=10s ./e2e/...

    - name: Run profiler benchmarks (Sprint 13.2)
      run: |
        echo "=== ProcessEvent Benchmark (target p99 < 10µs) ==="
        go test -bench=BenchmarkProcessEvent -benchtime=5s ./internal/profiler/...
        echo "=== IsLearningComplete Benchmark (atomic.Bool fast path) ==="
        go test -bench=BenchmarkIsLearningComplete -benchtime=5s ./internal/profiler/...
        echo "=== Parallel Processing Benchmark ==="
        go test -bench=BenchmarkProcessEventParallel -benchtime=5s ./internal/profiler/...

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results-go${{ matrix.go-version }}
        path: |
          /tmp/ebpf-guard-*.prof
          /tmp/performance-*.json
