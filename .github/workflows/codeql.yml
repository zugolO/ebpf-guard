name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly scan every Monday at 08:00 UTC.
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: go
        # Use the security-extended query suite for broader coverage.
        queries: security-extended

    # Generate the bpf2go bindings before the build trace — they are not
    # committed, so autobuild's `go build` would otherwise fail with
    # undefined: bpf.*Objects.
    - name: Generate eBPF bindings
      uses: ./.github/actions/setup-ebpf

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: '/language:go'
