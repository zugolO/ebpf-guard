name: Config Validate

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'config/**'
      - 'deploy/helm/**'
      - 'internal/config/**'
      - 'cmd/ebpf-guard/main.go'
  pull_request:
    branches: [ main, develop ]

env:
  GOTOOLCHAIN: local

jobs:
  validate-config:
    name: Validate example config files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Generate eBPF bindings
        uses: ./.github/actions/setup-ebpf

      - name: Build ebpf-guard
        run: go build -o /tmp/ebpf-guard ./cmd/ebpf-guard

      - name: Validate config/config.yaml
        run: /tmp/ebpf-guard config validate --config config/config.yaml

      - name: Reject invalid store.backend (issue #114)
        run: |
          cat > /tmp/invalid-backend.yaml <<'EOF'
          store:
            backend: sqllite
          EOF
          if /tmp/ebpf-guard config validate --config /tmp/invalid-backend.yaml; then
            echo "ERROR: expected non-zero exit for invalid store.backend" >&2
            exit 1
          fi
          echo "OK: invalid store.backend correctly rejected"

      - name: Reject out-of-range sample_rate in rules (issue #114)
        run: go test -v -run "TestValidateRule_SampleRate" ./internal/correlator/...

      - name: Test config migrations
        run: go test -v -run "TestMigration|TestNoBreaking" ./internal/config/...

      - name: Lint Helm chart
        run: make helm-lint
