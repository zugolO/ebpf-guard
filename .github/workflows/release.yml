name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.26.5'
  CLANG_VERSION: '15'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing and SLSA provenance

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-${{ env.CLANG_VERSION }} llvm-${{ env.CLANG_VERSION }} libbpf-dev
        sudo ln -sf /usr/bin/clang-${{ env.CLANG_VERSION }} /usr/bin/clang

    - name: Install cosign
      uses: sigstore/cosign-installer@v3
      with:
        cosign-release: 'v2.2.3'

    - name: Set up QEMU
      if: matrix.arch == 'arm64'
      uses: docker/setup-qemu-action@v3

    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build binary (with PGO)
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 0
        LDFLAGS: >-
          -X main.Version=${{ steps.get_version.outputs.VERSION }}
          -X main.Commit=${{ github.sha }}
          -X main.BuildTime=${{ github.event.head_commit.timestamp }}
      run: |
        # -pgo=auto picks up default.pgo from the module root automatically.
        # The profile is committed to the repo and targets the hot path
        # (RuleEngine.EvaluateInto + EWMA scoring). Refresh with 'make pgo-update'.
        go build -pgo=auto -ldflags "$LDFLAGS" -o ebpf-guard-${{ matrix.os }}-${{ matrix.arch }} ./cmd/ebpf-guard

    - name: Create checksum
      run: |
        sha256sum ebpf-guard-${{ matrix.os }}-${{ matrix.arch }} > ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.sha256

    - name: Sign binary with cosign
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign sign-blob --yes \
          --bundle ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.cosign.bundle \
          ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}

    - name: Generate SBOM for binary (SPDX)
      uses: anchore/sbom-action@v0
      with:
        path: .
        output-file: ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.spdx.json
        format: spdx-json

    - name: Generate SBOM for binary (CycloneDX)
      uses: anchore/sbom-action@v0
      with:
        path: .
        output-file: ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.cyclonedx.json
        format: cyclonedx-json

    - name: Sign SBOM with cosign
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign sign-blob --yes \
          --bundle ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.spdx.json.cosign.bundle \
          ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.spdx.json

    - name: Compute artifact hashes for SLSA provenance
      id: hash
      run: |
        BINARY="ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}"
        HASH=$(sha256sum "${BINARY}" | base64 -w0)
        echo "hashes=${BINARY}:${HASH}" >> $GITHUB_OUTPUT

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}
        path: |
          ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}
          ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.sha256
          ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.cosign.bundle
          ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.spdx.json
          ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.spdx.json.cosign.bundle
          ebpf-guard-${{ matrix.os }}-${{ matrix.arch }}.cyclonedx.json

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install cosign
      uses: sigstore/cosign-installer@v3
      with:
        cosign-release: 'v2.2.3'

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}

    - name: Build and push
      id: build-and-push
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Sign container image
      env:
        DIGEST: ${{ steps.build-and-push.outputs.digest }}
        TAGS: ${{ steps.meta.outputs.tags }}
      run: |
        images=""
        for tag in ${TAGS}; do
          images+="${tag}@${DIGEST} "
        done
        cosign sign --yes ${images}

  provenance:
    name: Generate SLSA L3 Provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    # slsa-github-generator must run in a separate job — it calls back to the
    # workflow via the OIDC token and cannot share a job with artifact uploads.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
      provenance-name: ebpf-guard.intoto.jsonl

  helm:
    name: Package and Push Helm Chart
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Check if Helm chart exists
      id: helm_check
      run: |
        if [ -f "deploy/helm/ebpf-guard/Chart.yaml" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "::warning::Helm chart not found at deploy/helm/ebpf-guard/Chart.yaml — skipping release"
        fi

    - name: Set up Helm
      if: steps.helm_check.outputs.exists == 'true'
      uses: azure/setup-helm@v4
      with:
        version: '3.14.0'

    - name: Log in to Container Registry
      if: steps.helm_check.outputs.exists == 'true'
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

    - name: Package Helm chart
      if: steps.helm_check.outputs.exists == 'true'
      run: |
        helm package deploy/helm/ebpf-guard --destination .

    - name: Push Helm chart
      if: steps.helm_check.outputs.exists == 'true'
      run: |
        CHART_FILE=$(ls ebpf-guard-*.tgz | head -n1)
        helm push "$CHART_FILE" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker, helm, provenance]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: ebpf-guard-*

    - name: Generate changelog
      id: changelog
      run: |
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD~1)..HEAD >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body: |
          ## Changes
          ${{ steps.changelog.outputs.CHANGELOG }}

          ## Docker Images
          - `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

          ## Supply Chain Security

          ### Verify container image (cosign keyless)
          ```bash
          cosign verify ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
          ```

          ### Verify binary (cosign keyless)
          ```bash
          # Download binary and bundle
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ebpf-guard-linux-amd64
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ebpf-guard-linux-amd64.cosign.bundle

          cosign verify-blob \
            --bundle ebpf-guard-linux-amd64.cosign.bundle \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ebpf-guard-linux-amd64
          ```

          ### Verify SLSA L3 provenance
          ```bash
          # Install slsa-verifier: https://github.com/slsa-framework/slsa-verifier
          slsa-verifier verify-artifact ebpf-guard-linux-amd64 \
            --provenance-path ebpf-guard.intoto.jsonl \
            --source-uri github.com/${{ github.repository }} \
            --source-tag ${{ github.ref_name }}
          ```

          ## SBOM
          Software Bill of Materials (SPDX and CycloneDX formats) are attached to this release.
          SBOM files are also signed — verify with `cosign verify-blob` using the `.cosign.bundle` file.

          ## Helm Chart
          ```bash
          helm install ebpf-guard oci://ghcr.io/${{ github.repository_owner }}/charts/ebpf-guard --version ${{ github.ref_name }}
          ```
        files: |
          artifacts/ebpf-guard-linux-amd64/ebpf-guard-linux-amd64
          artifacts/ebpf-guard-linux-amd64/ebpf-guard-linux-amd64.sha256
          artifacts/ebpf-guard-linux-amd64/ebpf-guard-linux-amd64.cosign.bundle
          artifacts/ebpf-guard-linux-amd64/ebpf-guard-linux-amd64.spdx.json
          artifacts/ebpf-guard-linux-amd64/ebpf-guard-linux-amd64.spdx.json.cosign.bundle
          artifacts/ebpf-guard-linux-amd64/ebpf-guard-linux-amd64.cyclonedx.json
          artifacts/ebpf-guard-linux-arm64/ebpf-guard-linux-arm64
          artifacts/ebpf-guard-linux-arm64/ebpf-guard-linux-arm64.sha256
          artifacts/ebpf-guard-linux-arm64/ebpf-guard-linux-arm64.cosign.bundle
          artifacts/ebpf-guard-linux-arm64/ebpf-guard-linux-arm64.spdx.json
          artifacts/ebpf-guard-linux-arm64/ebpf-guard-linux-arm64.spdx.json.cosign.bundle
          artifacts/ebpf-guard-linux-arm64/ebpf-guard-linux-arm64.cyclonedx.json
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
