name: SBOM

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly to catch new vulnerabilities in dependencies
    - cron: '0 0 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  security-events: write

jobs:
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Generate SBOM (SPDX)
      uses: anchore/sbom-action@v0
      with:
        path: .
        output-file: ebpf-guard.spdx.json
        format: spdx-json
        artifact-name: ebpf-guard.spdx.json

    - name: Generate SBOM (CycloneDX)
      uses: anchore/sbom-action@v0
      with:
        path: .
        output-file: ebpf-guard.cyclonedx.json
        format: cyclonedx-json
        artifact-name: ebpf-guard.cyclonedx.json

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: |
          ebpf-guard.spdx.json
          ebpf-guard.cyclonedx.json

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: generate-sbom
    # Informational only: grype DB staleness and GHAS upload errors must not
    # block the PR. The scan result is still surfaced as an artifact.
    continue-on-error: true
    steps:
    - name: Download SBOM
      uses: actions/download-artifact@v4
      with:
        name: sbom

    - name: Scan SBOM for vulnerabilities
      id: scan
      uses: anchore/scan-action@v3
      with:
        sbom: ebpf-guard.spdx.json
        fail-build: false
        severity-cutoff: high

    - name: Upload scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('results.sarif') != ''
      with:
        sarif_file: results.sarif
