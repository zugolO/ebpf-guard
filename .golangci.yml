run:
  timeout: 5m
  go: "1.24"

linters:
  enable-all: false
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - typecheck
    - unused
    - gosec
    - bodyclose
    - exhaustive
    - gocritic
    - misspell
    - prealloc
    - revive

linters-settings:
  gosec:
    excludes:
      - G115  # integer overflow conversion (too many false positives with uint32/int)
  revive:
    rules:
      - name: exported
        disabled: true  # we don't require all exported symbols to have doc comments

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck
