# ebpf-guard configuration

server:
  bind_address: ":9090"
  metrics_path: "/metrics"
  health_path: "/health"

bpf:
  map_sizes:
    events: 65536
    processes: 16384
    connections: 32768

rules:
  path: "/etc/ebpf-guard/rules.yaml"
  hot_reload: true
  rate_limit_alerts: true
  rate_limit_window: 60
  max_alerts_per_window: 10

profiler:
  enabled: true
  learning_period: 3600
  # min_learning_samples: minimum events required before learning completes,
  # in addition to learning_period elapsing. Prevents false positives when a
  # node receives its first burst of traffic right before the timer fires.
  min_learning_samples: 100
  anomaly_threshold: 0.8
  ewma_weight: 0.3
  profile_ttl: 86400

alerting:
  enabled: false
  webhook_url: ""
  generator_url: "http://ebpf-guard:9090"
  batch_size: 100
  batch_timeout: 5
  circuit_breaker_threshold: 5

kubernetes:
  enabled: true
  kubeconfig_path: ""
  resync_period: 300

# Authentication configuration
# Two-role RBAC is enforced by default.
#   viewer_token: read-only access — GET /alerts, GET /rules, GET /health, GET /metrics
#   admin_token:  full access — all of the above + POST /feedback, PUT /rules, DELETE endpoints
# Tokens are auto-generated at startup when left empty (printed once to stderr).
# Health endpoints (/health, /health/ready, /health/live) are always public.
# To disable auth entirely (not recommended for production) set enabled: false.
# bearer_token is deprecated — use admin_token instead.
auth:
  enabled: true
  viewer_token: ""   # auto-generated if empty
  admin_token: ""    # auto-generated if empty
  bearer_token: ""   # deprecated: promoted to admin_token if admin_token is unset

# Notification configuration
# Send security alerts to Slack, Teams, or generic webhooks.
# All backends are disabled by default. Enable and configure as needed.
notifications:
  slack:
    enabled: false
    webhook_url: ""           # Slack Incoming Webhook URL
    channel: "#security-alerts"  # Optional channel override
    min_severity: warning     # warning | critical
  teams:
    enabled: false
    webhook_url: ""           # Microsoft Teams Incoming Webhook URL
    min_severity: warning     # warning | critical
  webhook:
    enabled: false
    url: ""                   # Generic webhook URL (PagerDuty, Discord, etc.)
    headers:                  # Custom HTTP headers
      Authorization: ""
    template: ""              # Go template for request body (empty = default JSON)
    min_severity: warning     # warning | critical

# Enforcement configuration
# Controls active response actions: kill, block, throttle.
# All enforcement is disabled by default — enable only on hardened, tested deployments.
enforcement:
  enabled: false
  block_backend: log          # log | nftables | iptables | xdp
  dry_run: false              # log actions without executing them
  enable_block: false
  enable_kill: false
  enable_throttle: false
  throttle_cpu_percent: 10    # cgroup v2 CPU limit when throttling (1-99)
  # Append-only JSONL audit log for every kill/block/throttle action.
  # Format: {"ts":"...","action":"kill","pid":1234,"rule":"rule_001","comm":"bash","enforced":true}
  # Rotated to audit.jsonl.1 when the file exceeds 100 MB.
  # Leave empty to disable audit logging.
  audit_log: ""               # e.g. /var/log/ebpf-guard/audit.jsonl

# Store configuration
# Configure the backend for alert persistence.
# Supported backends: memory, sqlite, opensearch
store:
  backend: memory             # memory | sqlite | opensearch
  sqlite:
    path: /var/lib/ebpf-guard/events.db
  opensearch:
    url: ""                   # e.g., https://opensearch:9200
    index: ebpf-guard-events
    username: admin
    password: ""              # or reference to Kubernetes Secret
    insecure_skip_verify: false  # Set to true for self-signed certs

# Collectors configuration
# Controls per-collector behaviour including TLS plaintext inspection and
# OTel Trace Context extraction for APM ↔ security timeline correlation.
collectors:
  tls:
    enabled: false              # Requires CAP_SYS_PTRACE; attach uprobes to libssl processes
    scan_interval: 30s          # Interval to scan /proc for new libssl processes
    max_data_size: 256          # Maximum bytes captured per SSL_write/SSL_read call
  dns:
    enabled: true
    dga_threshold: 3.5          # Shannon entropy bits/char; above this → DGA suspicion
    tunneling_min_length: 50    # Domain length above this → tunneling suspicion
    high_frequency_threshold: 100  # DNS queries/min above this → alert
  backpressure_strategy: drop   # drop | block | sample
  otel_tracing:
    # When enabled, ebpf-guard scans TLS plaintext headers for the W3C "traceparent"
    # header and propagates the extracted trace_id/span_id to security alerts.
    # This links APM spans (Jaeger, Tempo, Datadog APM) to security events, producing
    # a single unified timeline across observability and security.
    # Requires collectors.tls.enabled=true to have effect.
    enabled: true
    # OTLP gRPC endpoint to export security-linked OTel spans.
    # Example: "otel-collector.monitoring.svc.cluster.local:4317"
    # When empty, spans flow only into the process-wide OTel SDK provider (if configured).
    exporter_endpoint: ""
    # OTel service.name on exported security spans.
    service_name: ebpf-guard
    # Include trace_id and span_id fields in generated alerts (JSON, Alertmanager, store).
    propagate_to_alerts: true

# WASM detection plugin engine
# Enables custom detection logic written in any language that compiles to WebAssembly.
# Place .wasm files (and optional .meta.yaml manifests) in the plugin directory.
#
# Plugin ABI — the .wasm module must export:
#   malloc(size i32) i32          — allocate memory in linear memory
#   free(ptr i32)                 — release allocated memory
#   evaluate(ptr i32, len i32) i32 — evaluate event JSON, return 1=match, 0=no match
#   alert_severity() i32          — 0=warning, 1=critical (called when evaluate=1)
#   alert_message_ptr() i32       — pointer to alert message string
#   alert_message_len() i32       — byte length of alert message
#
# Each .wasm file may have a companion .meta.yaml with: id, name, description, severity, action, tags
wasm:
  enabled: true
  plugin_dir: rules/custom     # Directory scanned for .wasm files at startup
  memory_limit_mb: 16          # Linear memory cap per plugin instance

# Gossip configuration
# Cross-node IOC (Indicator of Compromise) sharing between ebpf-guard agents.
# When enabled, each node broadcasts newly detected IOCs (IPs, domains, fingerprints)
# to configured peers so the entire cluster benefits from a single node's detections.
#
# Security note: set a strong shared secret and use HTTPS peers in production.
gossip:
  enabled: false
  secret: ""                  # Shared secret for X-Gossip-Secret header auth
  peers: []                   # Peer base URLs, e.g. ["http://10.0.0.2:9090"]
  ioc_ttl: 3600               # Seconds an IOC is considered valid (default: 1 hour)
  max_iocs: 100000            # Maximum IOC store size per node
  push_interval: 30           # Seconds between delta pushes to peers

# OSINT threat intelligence integration
# Automatically generates ebpf-guard detection rules from external IoC feeds.
# Supported sources: MISP, OpenCTI, VirusTotal (Enterprise).
#
# Generated YAML rule files are written to osint.output_dir and picked up
# by the correlator's hot-reload watcher without restarting the agent.
#
# Rule naming convention:
#   osint_<source>_ip_001.yaml      — IP blocklist rules (field: daddr, op: in)
#   osint_<source>_cidr_001.yaml    — CIDR blocklist rules (op: in_cidr, condition_group OR)
#   osint_<source>_domain_001.yaml  — Domain rules (field: qname, op: suffix)
osint:
  enabled: false
  refresh_interval: "3h"         # Duration between feed syncs (e.g., "1h", "30m", "12h")
  output_dir: rules/osint        # Directory for generated rule files
  max_iocs_per_rule: 500         # Max values per rule condition (larger = fewer files)

  misp:
    enabled: false
    url: ""                       # e.g., https://misp.example.com
    api_key: ""                   # MISP automation key (My Profile → Auth key)
    verify_tls: true
    attribute_types:              # MISP attribute types to fetch
      - ip-dst
      - ip-src
      - domain
      - hostname
    min_threat_level: 3           # 1=high, 2=medium, 3=low, 4=undefined
    tags: []                      # Filter by MISP tags (OR logic); empty = all

  opencti:
    enabled: false
    url: ""                       # e.g., https://opencti.example.com
    api_key: ""                   # OpenCTI API token
    verify_tls: true
    confidence_min: 50            # Minimum indicator confidence score (0-100)
    tlp_markings: []              # e.g., ["TLP:WHITE", "TLP:GREEN"]; empty = all

  virustotal:
    enabled: false
    api_key: ""                   # VirusTotal API key
    enterprise_feeds: false       # Requires VirusTotal Intelligence subscription
