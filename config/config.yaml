# ebpf-guard configuration

server:
  bind_address: ":9090"
  metrics_path: "/metrics"
  health_path: "/health"

bpf:
  map_sizes:
    events: 65536
    processes: 16384
    connections: 32768

rules:
  path: "/etc/ebpf-guard/rules.yaml"
  hot_reload: true
  rate_limit_alerts: true
  rate_limit_window: 60
  max_alerts_per_window: 10

profiler:
  enabled: true
  learning_period: 3600
  anomaly_threshold: 0.8
  ewma_weight: 0.3
  profile_ttl: 86400

alerting:
  enabled: false
  webhook_url: ""
  generator_url: "http://ebpf-guard:9090"
  batch_size: 100
  batch_timeout: 5
  circuit_breaker_threshold: 5

kubernetes:
  enabled: true
  kubeconfig_path: ""
  resync_period: 300

# Authentication configuration
# Bearer token auth is enabled by default for /metrics and /debug/pprof endpoints.
# If bearer_token is empty, a random 32-byte token is generated at startup and logged.
# To disable auth (not recommended for production), set enabled: false.
auth:
  enabled: true
  bearer_token: ""

# Notification configuration
# Send security alerts to Slack, Teams, or generic webhooks.
# All backends are disabled by default. Enable and configure as needed.
notifications:
  slack:
    enabled: false
    webhook_url: ""           # Slack Incoming Webhook URL
    channel: "#security-alerts"  # Optional channel override
    min_severity: warning     # warning | critical
  teams:
    enabled: false
    webhook_url: ""           # Microsoft Teams Incoming Webhook URL
    min_severity: warning     # warning | critical
  webhook:
    enabled: false
    url: ""                   # Generic webhook URL (PagerDuty, Discord, etc.)
    headers:                  # Custom HTTP headers
      Authorization: ""
    template: ""              # Go template for request body (empty = default JSON)
    min_severity: warning     # warning | critical

# Store configuration
# Configure the backend for alert persistence.
# Supported backends: memory, sqlite, opensearch
store:
  backend: memory             # memory | sqlite | opensearch
  sqlite:
    path: /var/lib/ebpf-guard/events.db
  opensearch:
    url: ""                   # e.g., https://opensearch:9200
    index: ebpf-guard-events
    username: admin
    password: ""              # or reference to Kubernetes Secret
    insecure_skip_verify: false  # Set to true for self-signed certs
