# =============================================================
# demo/docker-compose.yml — OWASP Juice Shop demo target
#
# Runs the Juice Shop vulnerable web app in Docker as a second
# attack target for the ebpf-guard demo, alongside the
# lightweight target-app/app.py.
#
# Usage:
#   docker compose -f demo/docker-compose.yml up -d
# =============================================================
services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: ebpf-guard-juice-shop
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/rest/admin/application-version"]
      interval: 10s
      timeout: 5s
      retries: 6
