global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ebpf-guard metrics (будет на хосте, не в контейнере)
  - job_name: 'ebpf-guard'
    static_configs:
      # В Linux Docker используем host.docker.internal (через extra_hosts) или gateway IP
      - targets: ['172.17.0.1:19090']  # Docker bridge gateway IP
    scrape_interval: 10s
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
