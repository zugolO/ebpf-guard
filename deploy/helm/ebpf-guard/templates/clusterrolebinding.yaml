apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ebpf-guard.fullname" . }}
  labels:
    {{- include "ebpf-guard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ebpf-guard.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ebpf-guard.serviceAccountName" . }}
    namespace: {{ include "ebpf-guard.namespace" . }}
