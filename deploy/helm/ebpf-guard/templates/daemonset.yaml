apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "ebpf-guard.fullname" . }}
  namespace: {{ include "ebpf-guard.namespace" . }}
  labels:
    {{- include "ebpf-guard.labels" . | nindent 4 }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ebpf-guard.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "ebpf-guard.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ebpf-guard.serviceAccountName" . }}
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.initContainers .Values.btfInit.enabled .Values.profilerStatePersistence.enabled }}
      initContainers:
        {{- if .Values.profilerStatePersistence.enabled }}
        - name: profiler-state-init
          image: busybox:1.36
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p {{ .Values.profilerStatePersistence.hostPath }}
              chmod 700 {{ .Values.profilerStatePersistence.hostPath }}
              echo "profiler-state-init: state directory ready at {{ .Values.profilerStatePersistence.hostPath }}"
          volumeMounts:
            - name: profiler-state
              mountPath: {{ .Values.profilerStatePersistence.hostPath }}
          resources:
            limits:
              cpu: 50m
              memory: 16Mi
            requests:
              cpu: 10m
              memory: 8Mi
        {{- end }}
        {{- if .Values.btfInit.enabled }}
        - name: btf-init
          image: {{ .Values.btfInit.image }}
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: false
          command:
            - sh
            - -c
            - |
              set -e
              RELEASE=$(cat /proc/sys/kernel/osrelease)
              ARCH=$(uname -m)
              . /etc/os-release
              CACHE="{{ .Values.btfInit.cachePath }}/${ID}/${VERSION_ID}/${ARCH}"
              BTF_FILE="${CACHE}/vmlinux-${RELEASE}.btf"
              if [ -f "${BTF_FILE}" ]; then
                echo "btf-init: cache hit ${BTF_FILE}"
                exit 0
              fi
              mkdir -p "${CACHE}"
              URL="https://github.com/aquasecurity/btfhub-archive/raw/main/${ID}/${VERSION_ID}/${ARCH}/vmlinux-${RELEASE}.btf.tar.xz"
              echo "btf-init: downloading ${URL}"
              curl -fsSL "${URL}" | tar -xJ -C "${CACHE}" --wildcards "*.btf" --transform 's|.*/||'
              echo "btf-init: extracted to ${BTF_FILE}"
          volumeMounts:
            - name: btf-cache
              mountPath: {{ .Values.btfInit.cachePath }}
          resources:
            {{- toYaml .Values.btfInit.resources | nindent 12 }}
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "ebpf-guard.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - "--config=/etc/ebpf-guard/config.yaml"
          ports:
            - name: metrics
              containerPort: {{ trimPrefix ":" .Values.config.server.bind_address | default "9090" }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.extraEnv .Values.config.store.sqlite.encryption.keySecretRef }}
          env:
            {{- with .Values.config.store.sqlite.encryption.keySecretRef }}
            - name: EBPF_GUARD_DB_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .name }}
                  key: {{ .key }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: cgroup-fs
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: proc-fs
              mountPath: /proc
              readOnly: true
            - name: modules
              mountPath: /lib/modules
              readOnly: true
            - name: config
              mountPath: /etc/ebpf-guard/config.yaml
              subPath: config.yaml
            - name: rules
              mountPath: /etc/ebpf-guard/rules.yaml
              subPath: rules.yaml
            {{- if .Values.btfInit.enabled }}
            - name: btf-cache
              mountPath: {{ .Values.btfInit.cachePath }}
              readOnly: true
            {{- end }}
            {{- if .Values.profilerStatePersistence.enabled }}
            - name: profiler-state
              mountPath: {{ .Values.profilerStatePersistence.hostPath }}
            {{- end }}
            {{- if .Values.auditLog.enabled }}
            - name: audit-log
              mountPath: {{ .Values.auditLog.hostDir }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: cgroup-fs
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: proc-fs
          hostPath:
            path: /proc
            type: Directory
        - name: modules
          hostPath:
            path: /lib/modules
            type: Directory
        - name: config
          configMap:
            name: {{ include "ebpf-guard.fullname" . }}-config
        - name: rules
          configMap:
            name: {{ include "ebpf-guard.fullname" . }}-rules
        {{- if .Values.btfInit.enabled }}
        - name: btf-cache
          emptyDir: {}
        {{- end }}
        {{- if .Values.profilerStatePersistence.enabled }}
        - name: profiler-state
          hostPath:
            path: {{ .Values.profilerStatePersistence.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.auditLog.enabled }}
        - name: audit-log
          hostPath:
            path: {{ .Values.auditLog.hostDir }}
            type: DirectoryOrCreate
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
