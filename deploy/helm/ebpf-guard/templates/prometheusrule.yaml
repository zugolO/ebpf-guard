{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "ebpf-guard.fullname" . }}
  namespace: {{ .Values.prometheusRule.namespace | default (include "ebpf-guard.namespace" .) }}
  labels:
    {{- include "ebpf-guard.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    {{- toYaml .Values.prometheusRule.groups | nindent 4 }}
{{- end }}
