{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ebpf-guard.serviceAccountName" . }}
  namespace: {{ include "ebpf-guard.namespace" . }}
  labels:
    {{- include "ebpf-guard.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
