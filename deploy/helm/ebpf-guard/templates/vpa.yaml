{{- if .Values.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "ebpf-guard.fullname" . }}
  namespace: {{ include "ebpf-guard.namespace" . }}
  labels:
    {{- include "ebpf-guard.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: {{ include "ebpf-guard.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: {{ .Chart.Name }}
        controlledResources:
          - cpu
          - memory
        controlledValues: RequestsOnly
        minAllowed:
          {{- toYaml .Values.vpa.minAllowed | nindent 10 }}
        maxAllowed:
          {{- toYaml .Values.vpa.maxAllowed | nindent 10 }}
{{- end }}
