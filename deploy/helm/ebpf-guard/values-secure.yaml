# Production hardened values for ebpf-guard.
# Usage: helm install ebpf-guard ./deploy/helm/ebpf-guard -f values-secure.yaml
#
# Security hardening applied vs. defaults:
#   - image.pullPolicy: Always (no stale cached image)
#   - priorityClassName: system-node-critical
#   - podSecurityContext: seccompProfile RuntimeDefault + runAsNonRoot (capabilities grant access)
#   - securityContext: drop ALL, add only the required capabilities, readOnlyRootFilesystem
#   - AppArmor annotation: uncomment if the profile is loaded on cluster nodes
#   - nodeSelector: Linux only
#   - Profiler persistence: enabled (avoids re-learning on restart)
#   - Audit log: enabled (ingested by SIEM log shipper)
#   - serviceMonitor + prometheusRule + VPA: enabled

image:
  pullPolicy: Always

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Soft Go memory limit derived from the 512Mi cap above (~460MiB at 90%).
gomemlimit:
  enabled: true
  percent: 90
  override: ""

priorityClassName: system-node-critical

podAnnotations:
  # Uncomment after loading the AppArmor profile on each node:
  # container.apparmor.security.beta.kubernetes.io/ebpf-guard: localhost/ebpf-guard

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 0  # root UID required for CAP_BPF — capabilities take effect at runtime
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
securityContext:
  privileged: false  # drop broad privilege; use explicit capabilities instead
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - SYS_ADMIN   # BPF on kernels < 5.8; BTF; cgroup
      - BPF         # BPF program loading (kernel 5.8+)
      - PERFMON     # BPF perf events (kernel 5.8+)
      - IPC_LOCK    # BPF map memory locking
      - NET_ADMIN   # nftables enforcement — remove if using LSM enforcement only

# Restrict to Linux nodes only
nodeSelector:
  kubernetes.io/os: linux

profilerStatePersistence:
  enabled: true
  hostPath: /var/lib/ebpf-guard

auditLog:
  enabled: true
  hostDir: /var/log/ebpf-guard

serviceMonitor:
  enabled: true
  interval: 15s

prometheusRule:
  enabled: true
  labels:
    prometheus: kube-prometheus

vpa:
  enabled: true
  updateMode: "Initial"

config:
  profiler:
    enabled: true
    learning_period: 7200
    anomaly_threshold: 0.75
    min_learning_samples: 500

  alerting:
    enabled: true
    batch_size: 50
    batch_timeout: 2
    circuit_breaker_threshold: 10

  store:
    backend: sqlite
    sqlite:
      path: /var/lib/ebpf-guard/events.db

  collectors:
    tls:
      enabled: true
    dns:
      enabled: true
      dga_threshold: 3.0
    backpressure_strategy: sample

  wasm:
    enabled: true
    memory_limit_mb: 32

# AI-agent sandbox (issue #255/#259). Deny-by-default containment for a
# designated agent Pod, targeted by label. Start in audit; only switch to
# enforce AFTER the agent workload is hardened as shown in the reference
# block at the bottom of this file — enforce downgrades itself to audit for
# any target that is privileged enough to tamper with the enforcer.
#
# NOTE: this is a top-level key (matching values.yaml's schema), not nested
# under `config:` — templates/configmap.yaml renders it from
# .Values.aiSandbox.*, not .Values.config.ai_sandbox.*.
aiSandbox:
  enabled: true
  mode: audit            # audit first; flip to enforce once the agent Pod is cap-dropped
  rulesPath: /etc/ebpf-guard/ai-agent.yaml
  selector:
    kubeLabel: "ebpf-guard.io/sandbox-profile"
    defaultProfile: "ai-agent"
  profiles:
    - name: ai-agent
      allowed_exec:        [/usr/bin/, /bin/, /usr/local/bin/]
      allowed_read_paths:  [/workspace/, /usr/, /lib/, /etc/ssl/]
      allowed_write_paths: [/workspace/, /tmp/]
      # ebpf-guard's own config/rules/binary/socket, /sys/fs/bpf and
      # /sys/kernel/security are denied automatically (baseline); list your
      # own secret dirs here for defence-in-depth.
      denied_paths:        [/root/.ssh/, /home/, /.aws/, /.config/gcloud/]
      allowed_egress_cidrs: [140.82.112.0/20, 151.101.0.0/16]
      allowed_egress_ports: [443]
      allowed_domains:     [github.com, pypi.org, registry.npmjs.org]

# ─────────────────────────────────────────────────────────────────────────────
# REFERENCE — hardened securityContext for the SANDBOXED AGENT workload.
#
# This is NOT part of the ebpf-guard chart; it belongs on YOUR agent Pod (the
# thing being sandboxed). ebpf-guard's in-kernel enforcement is only a real
# boundary if the agent cannot tamper with it, so the agent workload MUST be
# unprivileged. If it carries CAP_BPF/CAP_SYS_ADMIN/CAP_SYS_PTRACE or can write
# /sys/fs/bpf or /sys/fs/cgroup, ebpf-guard refuses to report kernel_enforced
# and downgrades that target to audit-only.
#
# apiVersion: v1
# kind: Pod
# metadata:
#   name: coding-agent
#   labels:
#     ebpf-guard.io/sandbox-profile: ai-agent   # <- selects the profile above
# spec:
#   securityContext:
#     runAsNonRoot: true
#     seccompProfile:
#       type: RuntimeDefault
#   containers:
#     - name: agent
#       image: your/agent:latest
#       securityContext:
#         allowPrivilegeEscalation: false
#         readOnlyRootFilesystem: true
#         capabilities:
#           drop: ["ALL"]        # in particular NO BPF / SYS_ADMIN / SYS_PTRACE
#       # Do NOT mount /sys/fs/bpf or /sys/fs/cgroup writable into this Pod.
# ─────────────────────────────────────────────────────────────────────────────

extraVolumeMounts:
  - name: varlib
    mountPath: /var/lib/ebpf-guard

extraVolumes:
  - name: varlib
    hostPath:
      path: /var/lib/ebpf-guard
      type: DirectoryOrCreate
