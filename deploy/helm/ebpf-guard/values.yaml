# Default values for ebpf-guard.

image:
  repository: zugolO/ebpf-guard
  tag: ""  # Defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Create a dedicated namespace. Set to false if the namespace already exists.
namespaceCreate: true

serviceAccount:
  create: true
  annotations: {}
  name: ""

# DaemonSet update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# Pod-level settings
podAnnotations: {}
podLabels: {}

# Allow scheduling on all nodes including control-plane taints
tolerations:
  - operator: Exists

# Node selector to restrict to specific nodes
nodeSelector: {}

# Affinity rules
affinity: {}

# Priority class for security-critical workloads
priorityClassName: ""

# Security context for the pod
podSecurityContext: {}

# Security context for the container.
# privileged: true is required for eBPF programs.
securityContext:
  privileged: true

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Go runtime soft memory limit (GOMEMLIMIT).
# When enabled and resources.limits.memory is set, the DaemonSet gets a
# GOMEMLIMIT env var computed as `percent` of the memory limit, so the Go GC
# keeps RSS under the cgroup limit and avoids OOM-kills under high event rates.
# If resources.limits.memory is unset, GOMEMLIMIT is NOT injected (the runtime
# stays unbounded). Set `override` to pin an explicit value (e.g. "230MiB").
gomemlimit:
  enabled: true
  percent: 90
  override: ""

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health/live
    port: metrics
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

# Additional volume mounts for the agent container
extraVolumeMounts: []
# - name: custom-rules
#   mountPath: /etc/ebpf-guard/custom

# Additional volumes
extraVolumes: []
# - name: custom-rules
#   configMap:
#     name: my-custom-rules

# Additional environment variables
extraEnv: []
# - name: MY_VAR
#   value: "value"

# Additional init containers (user-defined, appended after btfInit if enabled)
initContainers: []

# Profiler state persistence — saves the EWMA behavioral baseline to disk on
# graceful shutdown so the learning period can be skipped on pod restart.
# Requires the host path /var/lib/ebpf-guard/ to be writable by root.
profilerStatePersistence:
  # enabled toggles state save/restore.  Set to true for production clusters
  # where rolling DaemonSet updates should not incur a new learning window.
  enabled: false
  # hostPath is the directory on the node where the state file is stored.
  # The file name is "profiler-state.json" within this directory.
  hostPath: /var/lib/ebpf-guard

# Audit log for rule changes and config hot-reloads.
# When enabled the container mounts hostDir on the node so audit JSONL files
# are written to the host filesystem and can be ingested by log shippers (e.g.
# Fluentd, Vector, Filebeat) into a SIEM.
auditLog:
  # enabled mounts the host directory and passes the audit.path config to the agent.
  enabled: false
  # hostDir is the directory on the node where audit JSONL files are stored.
  hostDir: /var/log/ebpf-guard

# BTF init container — pre-fetches the BTF file for kernels without
# /sys/kernel/btf/vmlinux (Ubuntu 18.04, Amazon Linux 2, RHEL 8.x, etc.).
# When enabled an initContainer downloads the matching BTF file from the
# BTF hub archive and writes it to a shared emptyDir volume that the main
# container mounts at /var/lib/ebpf-guard/btf.
btfInit:
  enabled: false
  image: curlimages/curl:8.6.0
  # cachePath is the directory inside the container where BTF files are written.
  cachePath: /var/lib/ebpf-guard/btf
  resources:
    limits:
      cpu: 200m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Kubernetes Service for Prometheus scraping
service:
  type: ClusterIP
  port: 9090
  annotations: {}

# Prometheus ServiceMonitor (requires prometheus-operator)
serviceMonitor:
  enabled: false
  namespace: ""  # Defaults to release namespace
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []
  metricRelabelings: []

# PrometheusRule for alerting (requires prometheus-operator)
prometheusRule:
  enabled: false
  namespace: ""  # Defaults to release namespace
  labels: {}
  groups:
    - name: ebpf-guard.rules
      rules:
        - alert: EbpfGuardDown
          expr: absent(ebpf_guard_heartbeat_timestamp_seconds) or (time() - ebpf_guard_heartbeat_timestamp_seconds > 60)
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "ebpf-guard agent is down on {{ $labels.node }}"
            description: "No heartbeat received from ebpf-guard for more than 2 minutes."
        - alert: EbpfGuardHighAlertRate
          # Aggregate per node before thresholding: ebpf_guard_alerts_total now
          # carries pod/node labels, so a bare rate() would evaluate per
          # (rule_id, severity, namespace, pod, node) series and a node emitting
          # >10 alerts/sec spread across many pods would never cross the threshold.
          expr: sum by (node) (rate(ebpf_guard_alerts_total[5m])) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High alert rate on {{ $labels.node }}"
            description: "ebpf-guard is generating more than 10 alerts/sec on {{ $labels.node }}."
        - alert: RuleReloadStale
          expr: time() - ebpf_guard_rule_last_reload_timestamp_seconds > 300
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ebpf-guard rules have not reloaded in 5 minutes (expected every 60s)"
            description: "ebpf-guard on {{ $labels.node }} has not performed a successful rule hot-reload in more than 5 minutes."
        - alert: RuleReloadFailing
          expr: increase(ebpf_guard_rule_reload_total{status="failure"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "ebpf-guard rule reload failures detected on {{ $labels.node }}"
            description: "One or more rule hot-reload attempts have failed in the last 5 minutes on {{ $labels.node }}."
        # Issue #102: memory pressure profiler degradation alerts
        - alert: EbpfGuardMemoryPressure
          expr: ebpf_guard_memory_pressure_level > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ebpf-guard profiler degraded due to memory pressure on {{ $labels.node }}"
            description: >-
              ebpf-guard memory pressure level is {{ $value }} on {{ $labels.node }}
              (1=sequence_profiling_disabled, 2=all_profiling_disabled).
              Free memory has fallen below the configured threshold.
        # Issue #211: CPU pressure load-shedding alerts
        - alert: EbpfGuardCPUPressure
          expr: ebpf_guard_cpu_pressure_level > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ebpf-guard shedding collectors due to CPU pressure on {{ $labels.node }}"
            description: >-
              ebpf-guard CPU pressure level is {{ $value }} on {{ $labels.node }}
              (1=file_sampling_reduced, 2=all_noisy_sampling_reduced).
              Agent CPU usage has exceeded the configured budget.
        # Issue #103: collector failure alerts
        - alert: EbpfGuardCollectorDown
          expr: ebpf_guard_collector_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "ebpf-guard collector {{ $labels.collector }} is down on {{ $labels.node }}"
            description: >-
              The ebpf-guard collector '{{ $labels.collector }}' on {{ $labels.node }} has failed.
              The agent is running with reduced event coverage. Check logs for the root cause.
        # Issue #105: event queue saturation alert
        - alert: EbpfGuardEventQueueSaturated
          expr: ebpf_guard_event_queue_depth / ebpf_guard_event_queue_capacity > 0.9
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "ebpf-guard event queue is saturated on {{ $labels.node }}"
            description: >-
              The ebpf-guard event queue on {{ $labels.node }} is more than 90% full
              ({{ $value | humanizePercentage }}). Events may be dropped. Consider increasing
              bpf.event_queue_depth or bpf.max_concurrent_events, or investigate a burst
              source generating excessive events.
        # Issue #115: canary file integrity alerts
        - alert: EbpfGuardCanaryFileTampered
          expr: ebpf_guard_canary_files_intact == 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Canary file tampered or deleted on {{ $labels.node }}"
            description: >-
              The ebpf-guard canary file '{{ $labels.path }}' on {{ $labels.node }}
              is missing or its content has changed. This is a high-confidence indicator
              of attacker activity — no legitimate process should touch canary files.
              Investigate immediately.
        # Issue #113: Kubernetes enricher health alerts
        - alert: EbpfGuardK8sEnricherStale
          expr: time() - ebpf_guard_k8s_enricher_last_sync_timestamp_seconds > 600
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "ebpf-guard K8s enricher has not synced for >10 minutes on {{ $labels.node }}"
            description: >-
              The Kubernetes pod watcher on {{ $labels.node }} has not received any data
              from the API server for more than 10 minutes. Pod metadata enrichment may be
              stale, causing detection rules that match on namespace/labels to use outdated
              data. Check API server connectivity and watch permissions.
        - alert: EbpfGuardK8sEnricherHighMissRate
          expr: rate(ebpf_guard_k8s_enricher_miss_total[5m]) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ebpf-guard K8s enricher miss rate is high on {{ $labels.node }}"
            description: >-
              The Kubernetes enricher on {{ $labels.node }} is failing to find pod metadata
              for more than 10 events/second over the last 5 minutes. This usually means
              processes are running outside containers, the pod watcher cache is lagging, or
              container IDs cannot be extracted from cgroups. Alerts from these events will
              lack namespace/label enrichment.

# VerticalPodAutoscaler
vpa:
  enabled: false
  updateMode: "Off"  # Off | Initial | Recreate
  minAllowed:
    cpu: 50m
    memory: 64Mi
  maxAllowed:
    cpu: 2000m
    memory: 1Gi

# ebpf-guard agent configuration
config:
  server:
    bind_address: ":9090"
    metrics_path: "/metrics"
    health_path: "/health"
    # enable_pprof exposes Go pprof endpoints at /debug/pprof (default: false).
    # These endpoints are protected by admin-token RBAC, but they reveal heap and
    # goroutine details — only enable during active profiling sessions and disable
    # again once done. See docs/pprof.md for usage instructions.
    enable_pprof: false

  bpf:
    map_sizes:
      events: 65536
      processes: 16384
      connections: 32768
    # BTF CO-RE portability settings (kernels 5.4+ without /sys/kernel/btf/vmlinux)
    btf_path: ""                              # explicit BTF file override; empty = auto-detect
    btf_hub_enabled: true                     # download from BTF hub on first run if local BTF absent
    btf_hub_cache: /var/lib/ebpf-guard/btf   # local cache directory for BTF hub files
    fallback_reduced_features: false          # if true, start without LSM/TLS collectors when BTF unavailable

  rules:
    path: "/etc/ebpf-guard/rules.yaml"
    hot_reload: true
    rate_limit_alerts: true
    rate_limit_window: 60
    max_alerts_per_window: 10

  profiler:
    enabled: true
    learning_period: 3600
    min_learning_samples: 100
    anomaly_threshold: 0.8
    ewma_weight: 0.3
    profile_ttl: 86400

  alerting:
    enabled: false
    webhook_url: ""
    generator_url: ""
    batch_size: 100
    batch_timeout: 5
    circuit_breaker_threshold: 5

  kubernetes:
    enabled: true
    kubeconfig_path: ""
    resync_period: 300

  auth:
    enabled: true
    bearer_token: ""  # Auto-generated at startup if empty

  notifications:
    slack:
      enabled: false
      webhook_url: ""
      channel: "#security-alerts"
      min_severity: warning
    teams:
      enabled: false
      webhook_url: ""
      min_severity: warning
    webhook:
      enabled: false
      url: ""
      headers: {}
      template: ""
      min_severity: warning

  store:
    backend: memory  # memory | sqlite | opensearch
    sqlite:
      path: /var/lib/ebpf-guard/events.db
      encryption:
        enabled: false
        # key_env: EBPF_GUARD_DB_KEY      # env var holding 64-char hex or base64 key
        # key_file: /run/secrets/db-key   # file path (e.g. Kubernetes Secret mount)
        # keySecretRef injects the key from a Kubernetes Secret as the env var
        # EBPF_GUARD_DB_KEY, which you must also set as key_env above.
        # keySecretRef:
        #   name: ebpf-guard-db-key       # Secret name in the same namespace
        #   key: encryption-key           # key inside the Secret
    opensearch:
      url: ""
      index: ebpf-guard-events
      username: admin
      password: ""
      insecure_skip_verify: false

  collectors:
    tls:
      enabled: false
      scan_interval: 30s
      max_data_size: 256
    dns:
      enabled: true
      dga_threshold: 3.5
      tunneling_min_length: 50
      high_frequency_threshold: 100
    backpressure_strategy: drop
    otel_tracing:
      enabled: true
      exporter_endpoint: ""
      service_name: ebpf-guard
      propagate_to_alerts: true

  wasm:
    enabled: true
    plugin_dir: rules/custom
    memory_limit_mb: 16

  gossip:
    enabled: false
    secret: ""
    peers: []
    ioc_ttl: 3600
    max_iocs: 100000
    push_interval: 30

  osint:
    enabled: false
    refresh_interval: "3h"
    output_dir: rules/osint
    max_iocs_per_rule: 500
    misp:
      enabled: false
      url: ""
      api_key: ""
      verify_tls: true
      attribute_types:
        - ip-dst
        - ip-src
        - domain
        - hostname
      min_threat_level: 3
      tags: []
    opencti:
      enabled: false
      url: ""
      api_key: ""
      verify_tls: true
      confidence_min: 50
      tlp_markings: []
    virustotal:
      enabled: false
      api_key: ""
      enterprise_feeds: false

# Detection rules written into the rules ConfigMap.
# Override to supply your own rule set.
rules:
  content: |
    rules:
      - id: unexpected_egress
        name: "Unexpected network egress"
        description: "Process opened TCP connection to unknown destination"
        event_type: network
        condition:
          field: dport
          op: not_in
          values: [80, 443, 53]
        severity: warning
        action: alert

      - id: sensitive_file_read
        name: "Sensitive file read"
        description: "Process read sensitive system file"
        event_type: file
        condition:
          field: filename
          op: prefix
          values: ["/etc/shadow", "/etc/passwd", "/proc/keys"]
        severity: critical
        action: alert

  # AI-agent semantic ruleset, mounted when aiSandbox.enabled=true and loaded
  # from ai_sandbox.rules_path. Fires as detections for any process; the
  # kernel allow-maps do the cgroup-scoped enforcement. Override to customise.
  aiAgentContent: |
    # AI-Agent Containment Rules for ebpf-guard (issue #255)
    #
    # ebpf-guard's second usage profile: constraining what an autonomous AI/coding
    # agent (Claude Code, Aider, Cursor, an in-cluster agent Pod, ...) is allowed to
    # do at runtime. These rules are expressed in *agent* terms — credential reads,
    # curl|sh pipelines, package-manager installs, egress to cloud metadata, secret
    # env dumps — rather than generic threat-detection terms.
    #
    # They complement (do not replace) the positive allow-policy enforced in the
    # kernel via the `ai_sandbox` config section. Rules here fire as detections/audit
    # signals for ANY process on the host; the config-driven cgroup allow-lists in
    # bpf/lsm.bpf.c perform the actual deny-by-default enforcement, scoped to the
    # agent's cgroup subtree.
    #
    # Scoping note: this file is loaded on demand from `ai_sandbox.rules_path` only
    # when `ai_sandbox.enabled: true` — it is NOT part of the default rules
    # directory, so it never fires unless you have opted into the agent profile.
    # The detections themselves are process-wide (they are not gated on cgroup
    # membership); pair them with an `ai_sandbox` profile so the kernel allow-maps
    # constrain the agent while these rules surface the attempts.
    #
    # Severity is deliberately conservative (mostly `warning`, `action: alert`) so
    # they are safe to enable in audit-first mode over a real agent workload before
    # switching the sandbox to `enforce`.

    rules:
      # ==========================================================================
      # Credential & secret access — the highest-value target for a prompt-injected
      # or over-eager agent. MITRE ATT&CK T1552 (Unsecured Credentials).
      # ==========================================================================

      - id: ai_agent_read_ssh_keys
        name: "AI Agent: read of SSH private key material"
        description: >
          A sandboxed agent process opened a file under ~/.ssh. Agents rarely need
          raw private keys; a read here is a classic exfiltration or lateral-movement
          setup step.
        event_type: file
        condition_group:
          operator: and
          conditions:
            - field: file.path
              op: contains
              values: ["/.ssh/"]
            - field: file.op
              op: in
              values: ["read", "open"]
        severity: critical
        action: alert
        tags: [ai-agent, sandbox, credential-access, mitre:T1552.004]

      - id: ai_agent_read_cloud_credentials
        name: "AI Agent: read of cloud credential files"
        description: >
          A sandboxed agent read AWS/GCP/Azure credential material. These grant
          control-plane access and are a prime exfiltration target for an agent that
          has been steered off-task.
        event_type: file
        condition_group:
          operator: and
          conditions:
            - field: file.path
              op: suffix
              values:
                - "/.aws/credentials"
                - "/.aws/config"
                - "/.config/gcloud/credentials.db"
                - "/.config/gcloud/access_tokens.db"
                - "/.azure/accessTokens.json"
                - "/.azure/azureProfile.json"
            - field: file.op
              op: in
              values: ["read", "open"]
        severity: critical
        action: alert
        tags: [ai-agent, sandbox, credential-access, cloud, mitre:T1552.001]

      - id: ai_agent_read_dotenv_secrets
        name: "AI Agent: read of .env / secret files"
        description: >
          A sandboxed agent opened a dotenv, kubeconfig, npmrc, pypirc, netrc, or
          git-credentials file. These commonly hold API tokens and registry
          credentials.
        event_type: file
        condition_group:
          operator: and
          conditions:
            - field: file.path
              op: suffix
              values:
                - "/.env"
                - "/.env.local"
                - "/.env.production"
                - "/.kube/config"
                - "/.npmrc"
                - "/.pypirc"
                - "/.netrc"
                - "/.git-credentials"
                - "/.docker/config.json"
            - field: file.op
              op: in
              values: ["read", "open"]
        severity: warning
        action: alert
        tags: [ai-agent, sandbox, credential-access, secrets, mitre:T1552.001]

      - id: ai_agent_read_proc_environ
        name: "AI Agent: read of /proc/<pid>/environ (secret env dump)"
        description: >
          A sandboxed agent read a process environment block from /proc. Environment
          variables frequently carry API keys and tokens; dumping another process's
          environ is a secret-harvesting technique.
        event_type: file
        condition_group:
          operator: and
          conditions:
            - field: file.path
              op: prefix
              values: ["/proc/"]
            - field: file.path
              op: suffix
              values: ["/environ"]
        severity: warning
        action: alert
        tags: [ai-agent, sandbox, credential-access, mitre:T1552.001]

      # ==========================================================================
      # Remote code execution pipelines — `curl | sh`, `wget | bash`, and
      # package-manager installs pulling arbitrary code. MITRE T1105 / T1059.
      # ==========================================================================

      - id: ai_agent_pipe_to_shell
        name: "AI Agent: curl|sh / wget|bash remote-code pipeline"
        description: >
          A process fetched a remote payload and piped it directly into an
          interpreter (curl ... | sh, wget ... | bash). This is the canonical
          unreviewed-remote-code pattern. Matched on the full command line
          regardless of which binary is running it, so a direct `curl … | sh`
          invocation is caught, not only a wrapping shell.
        event_type: syscall
        condition:
          field: proc.args
          op: regex
          values: ['(?i)(curl|wget)\s+[^|]*\|\s*(sudo\s+)?(ba)?sh\b']
        severity: critical
        action: alert
        tags: [ai-agent, sandbox, remote-code, mitre:T1105, mitre:T1059.004]

      - id: ai_agent_package_install
        name: "AI Agent: package-manager install pulling remote code"
        description: >
          A sandboxed agent ran a package manager install command (pip, npm, gem,
          cargo, go get, apt). Uncontrolled installs are a supply-chain and
          arbitrary-code-execution vector inside an agent sandbox.
        event_type: syscall
        condition:
          field: proc.args
          op: regex
          values:
            - '(?i)\b(pip3?|pipx)\s+install\b'
            - '(?i)\bnpm\s+(install|i|exec)\b'
            - '(?i)\bnpx\s+'
            - '(?i)\bgem\s+install\b'
            - '(?i)\bcargo\s+install\b'
            - '(?i)\bgo\s+(get|install)\b'
            - '(?i)\bapt(-get)?\s+install\b'
        severity: warning
        action: alert
        tags: [ai-agent, sandbox, supply-chain, mitre:T1059]

      # ==========================================================================
      # Persistence & self-modification — an agent writing to shell rc files, cron,
      # or authorized_keys to survive past its task. MITRE T1547 / T1053 / T1098.
      # ==========================================================================

      - id: ai_agent_write_persistence_paths
        name: "AI Agent: write to persistence / autostart paths"
        description: >
          A sandboxed agent wrote to a shell startup file, cron directory, systemd
          unit, or SSH authorized_keys. Legitimate coding tasks rarely touch these;
          writes here indicate an attempt to persist beyond the sandboxed task.
        event_type: file
        condition_group:
          operator: and
          conditions:
            - field: file.path
              op: suffix
              values:
                - "/.bashrc"
                - "/.bash_profile"
                - "/.profile"
                - "/.zshrc"
                - "/.ssh/authorized_keys"
            - field: file.op
              op: in
              values: ["write", "open"]
        severity: critical
        action: alert
        tags: [ai-agent, sandbox, persistence, mitre:T1547.001, mitre:T1098.004]

      - id: ai_agent_write_cron_systemd
        name: "AI Agent: write to cron / systemd unit directories"
        description: >
          A sandboxed agent wrote into a cron or systemd unit directory — a
          scheduled-task persistence vector.
        event_type: file
        condition_group:
          operator: and
          conditions:
            - field: file.path
              op: prefix
              values:
                - "/etc/cron.d/"
                - "/etc/cron.daily/"
                - "/etc/cron.hourly/"
                - "/var/spool/cron/"
                - "/etc/systemd/system/"
                - "/etc/systemd/user/"
            - field: file.op
              op: in
              values: ["write", "open"]
        severity: critical
        action: alert
        tags: [ai-agent, sandbox, persistence, mitre:T1053.003, mitre:T1543.002]

      # ==========================================================================
      # Egress control — connections an agent has no business making. The positive
      # allow-list lives in ai_sandbox config; these rules flag well-known abuse
      # destinations regardless of profile. MITRE T1552.005 / T1071.
      # ==========================================================================

      - id: ai_agent_egress_cloud_metadata
        name: "AI Agent: connection to cloud instance metadata service (SSRF)"
        description: >
          A sandboxed agent connected to the link-local cloud metadata endpoint
          (169.254.169.254). Agents reaching the metadata service can harvest
          instance role credentials — a common prompt-injection SSRF objective.
        event_type: network
        condition:
          field: daddr
          op: in
          values: ["169.254.169.254"]
        severity: critical
        action: alert
        tags: [ai-agent, sandbox, credential-access, ssrf, mitre:T1552.005]

      - id: ai_agent_git_push_ssh
        name: "AI Agent: git push over SSH to a remote"
        description: >
          A sandboxed agent's git process opened an outbound SSH connection
          (port 22) — typically a `git push` to a remote. In a contained agent this
          should match an allow-listed remote; flag for review otherwise.
        event_type: network
        condition_group:
          operator: and
          conditions:
            - field: proc.comm
              op: in
              values: ["git", "ssh", "git-remote-http"]
            - field: dport
              op: in
              values: ["22"]
        severity: warning
        action: alert
        tags: [ai-agent, sandbox, exfiltration, mitre:T1567]

      # ==========================================================================
      # Reverse / bind shells — an agent spawning an interactive shell back to a
      # remote is a strong compromise signal. MITRE T1059 / T1071.
      # ==========================================================================

      - id: ai_agent_reverse_shell_tooling
        name: "AI Agent: reverse-shell tooling invocation"
        description: >
          A sandboxed agent invoked netcat/socat/ncat with a shell redirection, or a
          language one-liner opening a socket to a shell — the canonical reverse-shell
          construction.
        event_type: syscall
        condition:
          field: proc.args
          op: regex
          values:
            - '(?i)\b(nc|ncat|netcat)\b.*\s-e\b'
            - '(?i)\bsocat\b.*\bexec'
            - '(?i)(bash|sh)\s+-i\b.*/dev/tcp/'
            - '(?i)/dev/tcp/[0-9]'
        severity: critical
        action: alert
        tags: [ai-agent, sandbox, reverse-shell, mitre:T1059.004]
# AI-agent sandbox (issue #255) — deny-by-default, allow-known-good policy for a
# designated agent process tree, enforced in the kernel via BPF LSM allow maps.
# Disabled and audit-first by default. When enabled with a kubeLabel, pods
# carrying that label have the named profile applied to their cgroup subtree.
# Requires kernel 5.7+ with CONFIG_BPF_LSM for enforcement; degrades to
# audit-only otherwise.
aiSandbox:
  enabled: false
  # mode: "audit" (log violations only) or "enforce" (deny with -EPERM).
  mode: audit
  # rulesPath is where the semantic ruleset is mounted (see rules.aiAgentContent).
  rulesPath: /etc/ebpf-guard/ai-agent.yaml
  selector:
    # Pods labelled with this key get the profile named by the label's value.
    kubeLabel: "ebpf-guard.io/sandbox-profile"
    defaultProfile: ""
  # profiles is a list of named allow-lists. Example:
  # profiles:
  #   - name: ai-agent
  #     allowed_exec: ["/usr/bin/", "/usr/local/bin/"]
  #     allowed_read_paths: ["/workspace/", "/etc/ssl/"]
  #     allowed_write_paths: ["/workspace/", "/tmp/"]
  #     denied_paths: ["/root/.ssh/", "/root/.aws/"]
  #     allowed_egress_cidrs: ["140.82.112.0/20"]
  #     allowed_egress_ports: [443]
  #     allowed_domains: ["github.com", "pypi.org"]
  profiles: []

# Enforcement settings — configure how ebpf-guard responds to threats.
enforcement:
  # networkpolicy controls automatic Kubernetes NetworkPolicy generation.
  networkpolicy:
    # enabled activates the networkpolicy action type and adds networkpolicies
    # write permission to the ClusterRole when true.
    enabled: false
    # mode: "suggest" sends the YAML via the notification channel for human review;
    # "apply" creates the policy directly via the Kubernetes API.
    mode: "suggest"
    # auto_cleanup_after removes applied policies after this duration (e.g. "1h").
    # Empty or "0s" disables auto-cleanup.
    auto_cleanup_after: "1h"
    # dry_run generates and logs the YAML without sending or applying it.
    dry_run: false

# BPF live program update — enables in-place eBPF replacement without restart.
bpfLiveUpdate:
  # enabled activates the live-update subsystem and the POST /api/v1/bpf/reload endpoint.
  enabled: false
  # watchPath is a host directory of .o files to watch for changes (fsnotify).
  # Empty disables file watching; reload is still available via the API.
  watchPath: ""
  # pendingPinDir is the bpffs path used to stage new programs before swapping.
  pendingPinDir: /sys/fs/bpf/ebpf-guard/pending

# Admission webhook — Kubernetes ValidatingAdmissionWebhook for pre-deploy policy
# enforcement. Evaluates pod specs against Rego policies before admission.
# Requires cert-manager or a manually-provisioned TLS certificate.
admissionWebhook:
  # enabled activates the ValidatingAdmissionWebhook resources. Default: false.
  enabled: false
  # mode: "warn" allows pods but annotates warnings; "enforce" denies violating pods.
  mode: "warn"
  # failurePolicy: "Ignore" allows pods when the webhook is unavailable (safe default).
  failurePolicy: "Ignore"
  # port is the HTTPS port the webhook server listens on.
  port: 8443
  # webhookPath is the URL path kube-apiserver sends requests to.
  webhookPath: "/admission"
  # timeoutSeconds is the timeout for the webhook call (1-30). Default: 5.
  timeoutSeconds: 5
  # caBundle is the base64-encoded CA certificate used to verify the webhook TLS.
  # Leave empty when using cert-manager (caBundle is injected automatically).
  caBundle: ""
  # namespaceSelector restricts which namespaces the webhook applies to.
  # To opt namespaces in, label them: kubectl label ns <name> ebpf-guard/admission=enabled
  namespaceSelector:
    matchLabels:
      ebpf-guard/admission: "enabled"
  # objectSelector optionally restricts which pods are sent to the webhook.
  objectSelector: {}
  # certManager configures automatic TLS provisioning via cert-manager.
  certManager:
    enabled: false
    issuerName: "selfsigned-issuer"
    issuerKind: "ClusterIssuer"

# Grafana dashboard ConfigMap (loaded by Grafana sidecar if enabled)
grafana:
  dashboard:
    enabled: false
    namespace: ""  # Defaults to release namespace
    label: grafana_dashboard
    labelValue: "1"
  # Fleet-wide dashboard: aggregates alerts/events/anomalies across every node
  # and pod in the DaemonSet, driven entirely by Prometheus (node/namespace/pod
  # labels on ebpf_guard_events_total / ebpf_guard_alerts_total). Ships alongside
  # the single-node dashboard above rather than replacing it.
  fleetDashboard:
    enabled: false
    namespace: ""  # Defaults to release namespace
    label: grafana_dashboard
    labelValue: "1"
