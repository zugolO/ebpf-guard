# Network anomaly explanation templates

templates:
  - id: network_unexpected_egress
    name: "Unexpected Network Egress"
    category: network
    summary: "Process {{.Comm}} (PID {{.PID}}) made unexpected outbound connection"
    detail: |
      The process {{.Comm}} (PID {{.PID}}) established a network connection 
      to an unexpected destination. This may indicate:
      - Command and control (C2) communication
      - Data exfiltration attempt
      - Lateral movement to another system
      - Unauthorized external access
      
      Context: Running in pod {{.Pod}} (namespace {{.Namespace}})
    severity: "warning"
    severity_why: |
      Warning severity because unexpected connections can be legitimate 
      but warrant investigation, especially from application processes 
      that should not make outbound connections.
    mitigations:
      - "Investigate the destination IP and port"
      - "Check process command line: cat /proc/{{.PID}}/cmdline"
      - "Review network logs for data transfer volume"
      - "Consider implementing egress network policies"
      - "Check for signs of compromise in process {{.Comm}}"
    references:
      - "https://attack.mitre.org/techniques/T1071/"
      - "https://attack.mitre.org/techniques/T1041/"
    mitre:
      tactic: "Command and Control"
      technique_id: "T1071"
      technique: "Application Layer Protocol"
      url: "https://attack.mitre.org/techniques/T1071/"
    plain:
      what_happened: "Process {{.Comm}} (PID {{.PID}}) made an outbound network connection to an unexpected destination."
      why_it_matters: "Unexpected outbound connections can mean an attacker is communicating with a command server (C2), exfiltrating data, or scanning your internal network. Application processes should generally only connect to known services."
      what_to_do: "1. Check the destination IP and port — is it a known service?\n2. Look at the process command line: cat /proc/{{.PID}}/cmdline.\n3. If this is expected behavior (e.g. a microservice calling an API), add the destination to your allowlist.\n4. Consider egress network policies to restrict outbound traffic."

  - id: network_ssrf_attempt
    name: "Potential SSRF Attempt"
    category: network
    summary: "Web process {{.Comm}} connected to internal service"
    detail: |
      The web process {{.Comm}} (PID {{.PID}}) made a connection that may 
      indicate Server-Side Request Forgery (SSRF). SSRF allows an attacker 
      to make the server perform requests to internal services that should 
      not be accessible from outside.
      
      SSRF can be used to:
      - Access internal APIs and services
      - Scan internal networks
      - Read internal configuration
      - Bypass access controls
      
      Context: Running in pod {{.Pod}} (namespace {{.Namespace}})
    severity: "critical"
    severity_why: |
      Critical severity because SSRF can lead to complete internal network 
      compromise, access to cloud metadata services, and bypass of security controls.
    mitigations:
      - "Review the URL/request that triggered the connection"
      - "Check application code for SSRF vulnerabilities"
      - "Implement URL validation and allowlisting"
      - "Block access to internal IP ranges from application servers"
      - "Use network policies to restrict pod egress"
    references:
      - "https://attack.mitre.org/techniques/T1195/"
      - "https://owasp.org/www-community/attacks/Server_Side_Request_Forgery"
    mitre:
      tactic: "Initial Access"
      technique_id: "T1195"
      technique: "Supply Chain Compromise"
      url: "https://attack.mitre.org/techniques/T1195/"
    plain:
      what_happened: "Your web application ({{.Comm}}, PID {{.PID}}) made a request to an internal service — a potential Server-Side Request Forgery (SSRF) attack."
      why_it_matters: "SSRF tricks your server into making requests to internal services that should not be accessible from outside. Attackers use this to read cloud metadata (AWS credentials), access internal APIs, or scan your private network."
      what_to_do: "1. Review the URL or IP that was accessed.\n2. Check your application code for SSRF vulnerabilities (unsanitized user input used in HTTP requests).\n3. Block access to cloud metadata endpoints (169.254.169.254) from your application.\n4. Use network policies to isolate your application from internal services."
