<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ebpf-guard dashboard</title>
  <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
  <header class="topbar">
    <h1>ebpf-guard</h1>
    <div class="status" id="status">connecting…</div>
    <button id="token-btn" class="btn-ghost" type="button">Token</button>
  </header>

  <main>
    <section class="summary">
      <div class="card stat">
        <div class="stat-value" id="stat-total">–</div>
        <div class="stat-label">Alerts (window)</div>
      </div>
      <div class="card stat">
        <div class="stat-value" id="stat-critical">–</div>
        <div class="stat-label">Critical</div>
      </div>
      <div class="card stat">
        <div class="stat-value" id="stat-warning">–</div>
        <div class="stat-label">Warning</div>
      </div>
      <div class="card" id="top-rules-card">
        <h2>Top rules</h2>
        <ul id="top-rules" class="bar-list"></ul>
      </div>
      <div class="card" id="timeline-card">
        <h2>Timeline</h2>
        <div id="timeline" class="timeline"></div>
      </div>
    </section>

    <section class="card" id="health-card">
      <h2>Agent health</h2>
      <div id="health-body" class="health-body">
        <p class="muted">Loading…</p>
      </div>
    </section>

    <section class="filters card">
      <label>Severity
        <select id="f-severity">
          <option value="">any</option>
          <option value="critical">critical</option>
          <option value="warning">warning</option>
        </select>
      </label>
      <label>Rule ID
        <input id="f-rule" type="text" placeholder="rule_001">
      </label>
      <label>Comm
        <input id="f-comm" type="text" placeholder="bash">
      </label>
      <label>Since
        <select id="f-since">
          <option value="1h">last hour</option>
          <option value="24h" selected>last 24h</option>
          <option value="168h">last 7d</option>
        </select>
      </label>
      <button id="refresh-btn" class="btn" type="button">Refresh</button>
    </section>

    <nav class="tabs">
      <button class="tab-btn active" id="tab-alerts" type="button" data-tab="alerts">Alerts</button>
      <button class="tab-btn" id="tab-incidents" type="button" data-tab="incidents">Incidents</button>
    </nav>

    <section class="content" id="view-alerts">
      <div class="card alert-feed">
        <h2>Alerts</h2>
        <div id="alerts" class="alert-list"></div>
      </div>
      <div class="card alert-detail" id="alert-detail">
        <h2>Details</h2>
        <p class="muted">Select an alert to see its explanation and MITRE ATT&amp;CK mapping.</p>
      </div>
    </section>

    <section class="content hidden" id="view-incidents">
      <div class="card incident-feed">
        <h2>Incidents</h2>
        <div class="incident-filters">
          <label>Status
            <select id="inc-status">
              <option value="">any</option>
              <option value="open">open</option>
              <option value="closed">closed</option>
            </select>
          </label>
          <label>Namespace
            <input id="inc-namespace" type="text" placeholder="production">
          </label>
          <button id="inc-refresh-btn" class="btn" type="button">Refresh</button>
        </div>
        <div id="incidents" class="alert-list"></div>
      </div>
      <div class="card alert-detail" id="incident-detail">
        <h2>Incident</h2>
        <p class="muted">Select an incident to see its grouped alerts.</p>
      </div>
    </section>
  </main>

  <dialog id="token-dialog">
    <form method="dialog" id="token-form">
      <label for="token-input">Bearer token</label>
      <input id="token-input" type="password" autocomplete="off">
      <div class="dialog-actions">
        <button type="button" id="token-clear" class="btn-ghost">Clear</button>
        <button type="submit" class="btn">Save</button>
      </div>
    </form>
  </dialog>

  <script src="/ui/app.js"></script>
</body>
</html>
