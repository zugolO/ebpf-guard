rules:
  # MITRE ATT&CK: T1552.001 — Credentials In Files: Cloud Credentials
  - id: cred_aws_credentials_read
    name: "AWS credentials file accessed"
    description: >
      An AWS credentials or config file was read by a process that is not the
      AWS CLI or a known cloud SDK. Attackers read these files to steal IAM
      access keys for lateral movement to the cloud control plane.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/.aws/credentials"
            - "/.aws/config"
        - field: file.op
          op: in
          values: ["read", "open"]
        - field: proc.comm
          op: not_in
          values: ["aws", "terraform", "packer", "ansible", "vault",
                   "python3", "python", "node", "java"]
    severity: warning
    action: alert
    tags: [mitre:T1552.001, credential-access, cloud]

  # MITRE ATT&CK: T1552.001
  - id: cred_gcp_service_account_read
    name: "GCP service account key file accessed"
    description: >
      A GCP service account JSON key file was accessed. These files grant
      full API access as the service account and are high-value targets.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values:
            - "/etc/gcp/"
            - "/etc/google/"
            - "/run/secrets/google"
        - field: file.path
          op: suffix
          values: [".json"]
        - field: file.op
          op: in
          values: ["read", "open"]
        - field: proc.comm
          op: not_in
          values: ["gcloud", "python3", "python", "node", "java", "terraform"]
    severity: warning
    action: alert
    tags: [mitre:T1552.001, credential-access, cloud, gcp]

  # MITRE ATT&CK: T1552.004 — Private Keys
  - id: cred_ssh_private_key_read
    name: "SSH private key file read by unexpected process"
    description: >
      An SSH private key file was read by a process other than ssh, scp, or
      an SSH agent. Attackers steal private keys for lateral movement.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/id_rsa"
            - "/id_ed25519"
            - "/id_ecdsa"
            - "/id_dsa"
            - "/identity"
        - field: file.op
          op: in
          values: ["read", "open"]
        - field: proc.comm
          op: not_in
          values: ["ssh", "scp", "sftp", "ssh-agent", "ssh-add", "git",
                   "ansible", "rsync", "terraform"]
    severity: warning
    action: alert
    tags: [mitre:T1552.004, credential-access, lateral-movement]

  # MITRE ATT&CK: T1003.008 — OS Credential Dumping: /etc/passwd and /etc/shadow
  - id: cred_shadow_read
    name: "/etc/shadow read by unexpected process"
    description: >
      /etc/shadow was read by a process that is not a standard PAM/auth binary.
      Shadow contains hashed passwords; reading it enables offline cracking.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: equals
          values: ["/etc/shadow", "/etc/shadow-"]
        - field: file.op
          op: in
          values: ["read", "open"]
        - field: proc.comm
          op: not_in
          values: ["passwd", "chpasswd", "chage", "login", "su", "sudo",
                   "sshd", "pam_unix", "shadow", "useradd", "usermod"]
    severity: critical
    action: alert
    tags: [mitre:T1003.008, credential-access]

  # MITRE ATT&CK: T1552.003 — Bash History
  - id: cred_bash_history_read
    name: "Shell history file read by unexpected process"
    description: >
      A shell history file was read by something other than a shell. History
      files often contain plaintext passwords entered on the command line.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/.bash_history"
            - "/.zsh_history"
            - "/.sh_history"
            - "/.history"
            - "/.python_history"
            - "/.mysql_history"
            - "/.psql_history"
        - field: file.op
          op: in
          values: ["read", "open"]
        - field: proc.comm
          op: not_in
          values: ["bash", "zsh", "sh", "fish", "history", "cat", "less",
                   "more", "grep", "vim", "nano"]
    severity: warning
    action: alert
    tags: [mitre:T1552.003, credential-access]

  # MITRE ATT&CK: T1552.001
  - id: cred_docker_auth_read
    name: "Docker registry auth config read"
    description: >
      The Docker auth configuration file was read, exposing registry credentials
      (base64-encoded username:password for container registries).
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/.docker/config.json"
            - "/.dockerconfigjson"
        - field: file.op
          op: in
          values: ["read", "open"]
        - field: proc.comm
          op: not_in
          values: ["docker", "podman", "containerd", "buildkit", "skopeo",
                   "crane", "ko", "ansible", "terraform"]
    severity: warning
    action: alert
    tags: [mitre:T1552.001, credential-access, supply-chain]

  # MITRE ATT&CK: T1555 — Credentials from Password Stores
  - id: cred_browser_store_read
    name: "Browser credential store accessed"
    description: >
      A browser's credential database (Chrome Login Data, Firefox logins.json,
      etc.) was accessed by a non-browser process. Credential-stealer malware
      reads these files to extract saved passwords.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/Login Data"
            - "/Login Data-journal"
            - "/logins.json"
            - "/key4.db"
            - "/signons.sqlite"
            - "/Cookies"
            - "/Web Data"
        - field: file.op
          op: in
          values: ["read", "open"]
        - field: proc.comm
          op: not_in
          values: ["chrome", "chromium", "firefox", "brave", "opera",
                   "google-chrome", "vivaldi", "microsoft-edge"]
    severity: warning
    action: alert
    tags: [mitre:T1555, credential-access]

  # MITRE ATT&CK: T1552.001
  - id: cred_vault_token_read
    name: "Vault / secret manager token file read"
    description: >
      A HashiCorp Vault token file or similar secret manager credential was
      accessed by an unexpected process.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/.vault-token"
            - "/.vault/token"
            - "/vault-token"
        - field: file.op
          op: in
          values: ["read", "open"]
        - field: proc.comm
          op: not_in
          values: ["vault", "consul", "nomad", "terraform", "ansible",
                   "python3", "python", "node", "java"]
    severity: critical
    action: alert
    tags: [mitre:T1552.001, credential-access, cloud]

  # MITRE ATT&CK: T1003.007 — Proc Filesystem credential dump
  - id: cred_proc_maps_mass_read
    name: "Mass /proc/<pid>/mem or /maps read — credential scraping"
    description: >
      Multiple /proc/<pid>/maps or /proc/<pid>/mem files read in rapid
      succession. This pattern indicates in-memory credential scraping
      (similar to Mimikatz on Linux).
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values: ["/proc/"]
        - field: file.path
          op: suffix
          values: ["/maps", "/mem", "/environ"]
        - field: proc.comm
          op: not_in
          values: ["gdb", "strace", "ltrace", "ps", "top", "htop",
                   "lsof", "procmon", "perf"]
    severity: critical
    action: alert
    tags: [mitre:T1003.007, credential-access, discovery]
