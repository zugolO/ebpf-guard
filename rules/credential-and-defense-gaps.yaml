rules:
  # MITRE ATT&CK: T1556.001 — Modify Authentication Process: PAM
  # Attackers modify PAM (Pluggable Authentication Modules) configuration
  # to capture credentials, bypass authentication, or create backdoors.
  - id: credaccess_pam_config_backdoor
    name: "PAM authentication configuration modified"
    description: >
      A file under /etc/pam.d/ was created or modified by a process that is not
      a known package manager or configuration management tool. PAM modifications
      can insert malicious modules (pam_unix.so wrappers), weaken authentication
      (nullok, sufficient control), or log credentials to attacker-controlled
      files. This is T1556.001 applied to Linux: modifying the authentication
      process itself.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values: ["/etc/pam.d/", "/etc/pam.conf"]
        - field: file.op
          op: in
          values: ["create", "write"]
        - field: proc.comm
          op: not_in
          values: ["dpkg", "rpm", "apt", "yum", "dnf", "pacman",
                   "zypper", "ansible", "puppet", "chef", "salt",
                   "sed", "tee", "echo", "cat", "vim", "nano", "emacs"]
    severity: critical
    action: alert
    tags: [mitre:T1556.001, credential-access, persistence, pam, authentication-backdoor]

  # MITRE ATT&CK: T1556.004 — Network Device Authentication: SSH authorized_keys
  - id: credaccess_ssh_authorized_keys_modified
    name: "SSH authorized_keys file modified by unexpected process"
    description: >
      An SSH authorized_keys file was written to from a process that is not
      ssh, sshd, or a known configuration tool. Attackers add their own public
      keys to maintain persistent access without passwords. This is a classic
      persistence technique used after initial compromise.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values: ["authorized_keys", "authorized_keys2"]
        - field: file.op
          op: in
          values: ["create", "write"]
        - field: proc.comm
          op: not_in
          values: ["ssh", "sshd", "ssh-copy-id", "scp", "git",
                   "ansible", "rsync", "vim", "nano", "cat", "echo"]
    severity: critical
    action: alert
    tags: [mitre:T1556.004, credential-access, persistence, ssh, authorized-keys]

  # MITRE ATT&CK: T1070.001 — Indicator Removal: Clear Linux System Logs
  - id: defense_evasion_journald_log_clear
    name: "System journal or application logs cleared"
    description: >
      journalctl --vacuum or rm of log files under /var/log was executed by a
      process that is not a known log rotation or maintenance tool. Attackers
      clear audit trails to remove evidence of their activity. Covers
      T1070.001 (Indicator Removal on Host: Clear Linux Logs/Journald).
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values: ["/var/log/"]
        - field: file.op
          op: in
          values: ["unlink", "rmdir", "truncate"]
        - field: proc.comm
          op: not_in
          values: ["logrotate", "logrotate.d", "journalctl", "rsyslogd",
                   "syslog-ng", "systemd-journald", "newsyslog"]
    severity: critical
    action: alert
    tags: [mitre:T1070.001, defense-evasion, log-clear, anti-forensics]

  # MITRE ATT&CK: T1559 — Inter-Process Communication: D-Bus Abuse
  - id: execution_dbus_activation_attack
    name: "D-Bus service activation from unexpected process"
    description: >
      dbus-send or gdbus was used to activate a D-Bus service or call a method
      from a process that is not a known desktop or system component. D-Bus
      can be abused for privilege escalation (CVE-2021-3560, polkit exploits),
      service activation (T1543.002: Systemd Service), and lateral movement
      across user sessions. Covers T1559 (Inter-Process Communication)
      applied to Linux desktop/server environments.
    event_type: syscall
    condition_group:
      operator: and
      conditions:
        - field: proc.comm
          op: in
          values: ["dbus-send", "gdbus", "dbus-monitor", "dbus-launch"]
        - field: syscall.nr
          op: equals
          values: ["59"]
    severity: warning
    action: alert
    tags: [mitre:T1559, execution, privilege-escalation, dbus, ipc]

  # MITRE ATT&CK: T1543.002 — Create or Modify System Process: Systemd Service
  # Writing new .service files to create persistent malicious services.
  - id: persistence_systemd_service_created
    name: "New systemd service unit file written by unexpected process"
    description: >
      A .service file was created under /etc/systemd/system or /lib/systemd/system
      by a process that is not a package manager. Attackers create systemd services
      to establish persistence: the service runs their malware on every boot, can
      restart automatically, and blends in with legitimate services.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values: [".service"]
        - field: file.path
          op: prefix
          values: ["/etc/systemd/system/", "/lib/systemd/system/",
                   "/usr/lib/systemd/system/", "/run/systemd/system/"]
        - field: file.op
          op: in
          values: ["create", "write"]
        - field: proc.comm
          op: not_in
          values: ["dpkg", "rpm", "apt", "yum", "dnf", "pacman",
                   "systemctl", "ansible", "puppet", "chef", "salt"]
    severity: critical
    action: alert
    tags: [mitre:T1543.002, persistence, systemd, service-creation]
