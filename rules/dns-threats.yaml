# DNS Threat Detection Rules
# These rules detect DNS-based threats including DGA domains, DNS tunneling,
# and suspicious query patterns.

rules:
  # DGA (Domain Generation Algorithm) Detection — Shannon entropy
  # High entropy domains are characteristic of malware using DGAs
  - id: dns_dga_high_entropy
    name: "DGA Domain Detected (High Entropy)"
    description: "Domain name exhibits high entropy characteristics typical of DGA malware"
    event_type: dns
    condition:
      field: qname_entropy
      op: gt
      values: ["3.5"]
    severity: critical
    action: alert
    tags: [dns, dga, malware]
    mitigation: |
      1. Isolate the affected host from the network
      2. Check for malware infections on the host
      3. Review DNS query logs for similar patterns
      4. Consider blocking the domain at the DNS resolver level

  # DGA Detection — N-gram character bigram model
  # Catches modern DGAs that deliberately produce normal Shannon entropy profiles
  # by scoring against a bigram language model trained on legitimate domain names.
  - id: dns_dga_ngram
    name: "DGA Domain Detected (N-gram Model)"
    description: "Domain name scores high on bigram DGA model — unusual character sequences typical of algorithm-generated names"
    event_type: dns
    condition:
      field: qname_dga_score
      op: gt
      values: ["0.70"]
    severity: critical
    action: alert
    tags: [dns, dga, malware, ngram]
    mitigation: |
      1. Isolate the affected host from the network
      2. Investigate the process making the DNS query
      3. Check for malware infections and DGA-family IOCs
      4. Block at DNS resolver and correlate with network traffic

  # DNS Tunneling Detection
  # Excessively long domain names may indicate data exfiltration via DNS
  - id: dns_tunneling_long_domain
    name: "DNS Tunneling Detected"
    description: "Unusually long domain name suggesting DNS tunneling or data exfiltration"
    event_type: dns
    condition:
      field: qname_length
      op: gt
      values: ["50"]
    severity: critical
    action: alert
    tags: [dns, tunneling, exfiltration]
    mitigation: |
      1. Investigate the process making the query
      2. Check for unauthorized data transfer
      3. Review firewall logs for related traffic
      4. Implement DNS query length limits if not present

  # Suspicious TLD Detection
  # Known malicious TLDs used by malware
  - id: dns_suspicious_tld_onion
    name: "Tor Hidden Service DNS Query"
    description: "Query to .onion domain via regular DNS (possible misconfiguration or malicious activity)"
    event_type: dns
    condition:
      field: qname
      op: suffix
      values: [".onion"]
    severity: warning
    action: alert
    tags: [dns, tor, suspicious-tld]

  - id: dns_suspicious_tld_emercoin
    name: "Emercoin TLD Query"
    description: "Query to Emercoin blockchain TLD (often used by malware)"
    event_type: dns
    condition:
      field: qname
      op: suffix
      values: [".bit", ".bazar", ".coin", ".lib", ".emc"]
    severity: warning
    action: alert
    tags: [dns, emercoin, suspicious-tld]

  # TXT Record Abuse
  # TXT queries may indicate DNS tunneling
  - id: dns_txt_suspicious
    name: "Suspicious TXT DNS Query"
    description: "TXT record query detected (possible DNS tunneling)"
    event_type: dns
    condition:
      field: qtype
      op: equals
      values: ["16"]
    severity: warning
    action: alert
    tags: [dns, txt, tunneling]

  # ANY Query Detection
  # ANY queries are often used for amplification attacks or reconnaissance
  - id: dns_any_query
    name: "DNS ANY Query"
    description: "DNS ANY query detected (possible amplification attack or reconnaissance)"
    event_type: dns
    condition:
      field: qtype
      op: equals
      values: ["255"]
    severity: warning
    action: alert
    tags: [dns, any, amplification]

  # NXDOMAIN Flood Detection
  # Many NXDOMAIN responses may indicate DGA or scanning
  - id: dns_nxdomain_flood
    name: "NXDOMAIN Response Flood"
    description: "Multiple NXDOMAIN responses suggesting DGA or domain scanning"
    event_type: dns
    condition:
      field: rcode
      op: equals
      values: ["3"]
    severity: warning
    action: alert
    tags: [dns, nxdomain, dga, scanning]

  # PTR Query Detection
  # Reverse DNS queries may indicate reconnaissance
  - id: dns_ptr_recon
    name: "Reverse DNS Reconnaissance"
    description: "PTR queries detected (possible network reconnaissance)"
    event_type: dns
    condition:
      field: qtype
      op: equals
      values: ["12"]
    severity: info
    action: alert
    tags: [dns, ptr, reconnaissance]

  # Dynamic DNS Detection
  # Queries to dynamic DNS services may indicate C2 communication
  - id: dns_dynamic_dns
    name: "Dynamic DNS Query"
    description: "Query to known dynamic DNS service (possible C2 communication)"
    event_type: dns
    condition:
      field: qname
      op: suffix
      values:
        - ".ddns.net"
        - ".duckdns.org"
        - ".no-ip.com"
        - ".dynu.com"
        - ".changeip.com"
        - ".dnsdynamic.org"
        - ".hopto.org"
        - ".zapto.org"
        - ".synology.me"
        - ".myqnapcloud.com"
    severity: warning
    action: alert
    tags: [dns, dynamic-dns, c2]

  # DNS over HTTPS (DoH) Detection
  # DoH can be used to bypass DNS monitoring
  - id: dns_doh_detected
    name: "DNS over HTTPS Detected"
    description: "Connection to known DoH resolver (may bypass DNS monitoring)"
    event_type: dns
    condition:
      field: qname
      op: in
      values:
        - "cloudflare-dns.com"
        - "dns.google"
        - "dns.quad9.net"
        - "doh.opendns.com"
        - "dns.nextdns.io"
    severity: info
    action: alert
    tags: [dns, doh, bypass]

# Configuration for DNS threat detection
config:
  # Entropy threshold for DGA detection (bits per character)
  dga_entropy_threshold: 3.5

  # N-gram DGA score threshold [0,1]
  dga_ngram_threshold: 0.70

  # Minimum domain length for DGA detection
  dga_min_length: 10

  # Minimum domain length for tunneling detection
  tunneling_min_length: 50

  # Suspicious TLDs list
  suspicious_tlds:
    - ".onion"
    - ".bit"
    - ".bazar"
    - ".coin"
    - ".lib"
    - ".emc"
    - ".zip"
    - ".mov"
    - ".phd"

  # Dynamic DNS domains
  dynamic_dns_domains:
    - ".ddns.net"
    - ".duckdns.org"
    - ".no-ip.com"
    - ".dynu.com"
    - ".changeip.com"
    - ".dnsdynamic.org"
    - ".hopto.org"
    - ".zapto.org"
    - ".synology.me"
    - ".myqnapcloud.com"
