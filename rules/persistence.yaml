rules:
  # MITRE ATT&CK: T1543.002 — Create or Modify System Process: Systemd Service
  - id: persistence_systemd_new_service
    name: "New systemd service unit created"
    description: >
      A new systemd service unit file was created outside of package management.
      Attackers install persistence as systemd services that survive reboots.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values:
            - "/etc/systemd/system/"
            - "/usr/local/lib/systemd/system/"
            - "/run/systemd/system/"
        - field: file.op
          op: in
          values: ["create", "write"]
        - field: proc.comm
          op: not_in
          values: ["dpkg", "rpm", "apt", "yum", "dnf", "zypper", "pacman",
                   "systemctl", "ansible", "chef", "puppet", "salt"]
    severity: warning
    action: alert
    tags: [mitre:T1543.002, persistence]

  # MITRE ATT&CK: T1053.003 — Scheduled Task/Job: Cron
  - id: persistence_cron_write
    name: "Cron job created or modified"
    description: >
      A cron job file was created or modified by a non-package-manager process.
      Attackers use cron for persistent command execution.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values:
            - "/etc/cron.d/"
            - "/etc/cron.daily/"
            - "/etc/cron.hourly/"
            - "/etc/cron.weekly/"
            - "/etc/cron.monthly/"
            - "/var/spool/cron/"
            - "/etc/crontab"
        - field: file.op
          op: in
          values: ["create", "write"]
        - field: proc.comm
          op: not_in
          values: ["dpkg", "rpm", "apt", "yum", "crontab", "anacron",
                   "puppet", "ansible", "chef", "salt"]
    severity: warning
    action: alert
    tags: [mitre:T1053.003, persistence]

  # MITRE ATT&CK: T1098.004 — Account Manipulation: SSH Authorized Keys
  - id: persistence_ssh_authorized_keys
    name: "SSH authorized_keys modified"
    description: >
      An SSH authorized_keys file was created or modified. Attackers add their
      public key to gain persistent password-free access.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/.ssh/authorized_keys"
            - "/.ssh/authorized_keys2"
        - field: file.op
          op: in
          values: ["create", "write"]
    severity: critical
    action: alert
    tags: [mitre:T1098.004, persistence, lateral-movement]

  # MITRE ATT&CK: T1556.003 — Pluggable Authentication Modules
  - id: persistence_pam_modified
    name: "PAM configuration or module modified"
    description: >
      A PAM configuration file or shared library was modified. Attackers
      backdoor PAM to capture credentials or bypass authentication
      (e.g. pam_unix.so patched to accept a master password).
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values:
            - "/etc/pam.d/"
            - "/lib/security/"
            - "/lib64/security/"
            - "/usr/lib/security/"
            - "/usr/lib64/security/"
        - field: file.op
          op: in
          values: ["create", "write"]
        - field: proc.comm
          op: not_in
          values: ["dpkg", "rpm", "apt", "yum", "dnf", "zypper", "pacman",
                   "ansible", "puppet", "chef"]
    severity: critical
    action: alert
    tags: [mitre:T1556.003, persistence, credential-access]

  # MITRE ATT&CK: T1546.004 — Unix Shell Configuration Modification
  - id: persistence_shell_rc_write
    name: "Shell startup file modified"
    description: >
      A shell startup file (.bashrc, .profile, .zshrc, etc.) was modified by
      a non-interactive process. Attackers add commands to these files for
      user-level persistence that runs on every login.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/.bashrc"
            - "/.bash_profile"
            - "/.bash_login"
            - "/.profile"
            - "/.zshrc"
            - "/.zprofile"
            - "/.zlogin"
            - "/.zshenv"
            - "/.config/fish/config.fish"
        - field: file.op
          op: in
          values: ["write"]
        - field: proc.comm
          op: not_in
          values: ["bash", "zsh", "fish", "sh", "vim", "nano", "emacs",
                   "ansible", "puppet", "chef", "salt"]
    severity: warning
    action: alert
    tags: [mitre:T1546.004, persistence]

  # MITRE ATT&CK: T1543.001 — Launch Agent / Launch Daemon
  - id: persistence_etc_init_write
    name: "SysV init or rc.d script created"
    description: >
      A new init script was created or modified in /etc/init.d/ or /etc/rc.d/.
      Legacy persistence mechanism still active on many Linux distributions.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values:
            - "/etc/init.d/"
            - "/etc/rc.d/"
            - "/etc/rc.local"
            - "/etc/rc2.d/"
            - "/etc/rc3.d/"
            - "/etc/rc5.d/"
        - field: file.op
          op: in
          values: ["create", "write"]
        - field: proc.comm
          op: not_in
          values: ["dpkg", "rpm", "apt", "yum", "update-rc.d", "chkconfig",
                   "ansible", "puppet", "chef"]
    severity: warning
    action: alert
    tags: [mitre:T1543.001, persistence]

  # MITRE ATT&CK: T1037.004 — Boot or Logon Initialization Scripts: RC Scripts
  - id: persistence_motd_write
    name: "MOTD / update-motd.d script modified"
    description: >
      A file in /etc/update-motd.d/ was modified. These scripts run as root
      on every SSH login and are used for persistence by attackers who have
      already gained root.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values:
            - "/etc/update-motd.d/"
            - "/etc/motd"
        - field: file.op
          op: in
          values: ["write", "create"]
    severity: warning
    action: alert
    tags: [mitre:T1037.004, persistence]

  # MITRE ATT&CK: T1574.006 — Hijack Execution Flow: Dynamic Linker Hijacking
  - id: persistence_ld_preload_env
    name: "LD_PRELOAD set in shell startup"
    description: >
      A shell startup file is being written and contains LD_PRELOAD. This
      technique is used to inject malicious shared libraries into every
      subsequently executed binary.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "/.bashrc"
            - "/.profile"
            - "/.bash_profile"
            - "/etc/environment"
            - "/etc/profile"
        - field: file.op
          op: in
          values: ["write", "create"]
    severity: warning
    action: alert
    tags: [mitre:T1574.006, persistence, defense-evasion]

  # MITRE ATT&CK: T1053.002 — At Job
  - id: persistence_at_spool_write
    name: "at job spool modified"
    description: >
      A file was written to the at/atd spool directory. The at scheduler runs
      one-time jobs and can be used for delayed command execution.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values: ["/var/spool/atjobs/", "/var/spool/at/"]
        - field: file.op
          op: in
          values: ["create", "write"]
        - field: proc.comm
          op: not_in
          values: ["at", "atd", "batch"]
    severity: warning
    action: alert
    tags: [mitre:T1053.002, persistence]
