rules:
  # MITRE ATT&CK: T1548.001 — Abuse Elevation Control Mechanism: Setuid and Setgid
  # Fires when any process gains CAP_SYS_ADMIN at runtime after initialisation.
  - id: privesc_sys_admin_gained
    name: "CAP_SYS_ADMIN gained at runtime"
    description: >
      A process gained CAP_SYS_ADMIN after startup. This capability allows
      mounting filesystems, loading kernel modules, and bypassing many security
      controls. Gaining it at runtime is a strong indicator of privilege
      escalation or container escape.
    event_type: privesc
    condition:
      field: caps
      op: caps_gained
      values:
        - CAP_SYS_ADMIN
    severity: critical
    action: alert
    tags: [mitre:T1548.001, container-escape, privesc]

  # CAP_NET_RAW allows raw socket creation (packet sniffing, ARP spoofing).
  # Gaining it outside container init is suspicious.
  - id: privesc_net_raw_gained
    name: "CAP_NET_RAW gained outside container init"
    description: >
      A process gained CAP_NET_RAW at runtime. This capability enables raw
      socket creation and is commonly abused for network sniffing and ARP
      spoofing. Legitimate containers set this at startup, not at runtime.
    event_type: privesc
    condition:
      field: caps
      op: caps_gained
      values:
        - CAP_NET_RAW
    severity: warning
    action: alert
    tags: [mitre:T1548.001, privesc, network]

  # CAP_SYS_MODULE allows loading/unloading kernel modules (rootkit path).
  - id: privesc_sys_module_gained
    name: "CAP_SYS_MODULE gained at runtime"
    description: >
      A process gained CAP_SYS_MODULE, allowing it to load arbitrary kernel
      modules. This is the primary rootkit installation path on Linux.
    event_type: privesc
    condition:
      field: caps
      op: caps_gained
      values:
        - CAP_SYS_MODULE
    severity: critical
    action: alert
    tags: [mitre:T1547.006, privesc, rootkit]

  # CAP_SYS_PTRACE allows tracing other processes (credential theft).
  - id: privesc_sys_ptrace_gained
    name: "CAP_SYS_PTRACE gained at runtime"
    description: >
      A process gained CAP_SYS_PTRACE, enabling it to inspect and modify
      the memory of other processes. Often used for credential theft or
      injecting code into running services.
    event_type: privesc
    condition:
      field: caps
      op: caps_gained
      values:
        - CAP_SYS_PTRACE
    severity: critical
    action: alert
    tags: [mitre:T1548.001, mitre:T1055, privesc]

  # Drop-all then re-gain is an evasion pattern: process deliberately drops
  # all caps (to appear unprivileged to monitors) then re-acquires them.
  - id: privesc_caps_drop_all
    name: "Process dropped all capabilities (evasion pattern)"
    description: >
      A process dropped all capabilities simultaneously. Combined with a
      subsequent cap gain, this is a known evasion technique to temporarily
      appear unprivileged to security monitors while retaining the ability
      to re-acquire privileges.
    event_type: privesc
    condition:
      field: caps
      op: caps_dropped
      values:
        - CAP_SYS_ADMIN
        - CAP_NET_ADMIN
        - CAP_SYS_MODULE
        - CAP_SYS_PTRACE
        - CAP_NET_RAW
    severity: warning
    action: alert
    tags: [mitre:T1548.001, privesc, evasion]

  # Gaining SETUID/SETGID allows changing to any UID/GID.
  - id: privesc_setuid_gained
    name: "CAP_SETUID or CAP_SETGID gained at runtime"
    description: >
      A process gained CAP_SETUID or CAP_SETGID, enabling it to change its
      effective user or group identity to any value including root (UID 0).
    event_type: privesc
    condition:
      field: caps
      op: caps_gained
      values:
        - CAP_SETUID
        - CAP_SETGID
    severity: critical
    action: alert
    tags: [mitre:T1548.001, privesc]

  # ============================================================================
  # T1548.002 — Abuse Elevation Control Mechanism: Bypass User Account Control
  # Additional dangerous capability combinations
  # ============================================================================

  # CAP_NET_ADMIN allows full network stack manipulation: routing, iptables,
  # interface configuration. Gaining it at runtime enables traffic interception.
  - id: privesc_net_admin_gained
    name: "CAP_NET_ADMIN gained at runtime"
    description: >
      A process gained CAP_NET_ADMIN at runtime. This capability grants full
      control over network interfaces, routing tables, and packet filtering —
      enabling traffic interception, ARP poisoning, and network namespace
      manipulation (T1548.002). Legitimate containers configure this at init.
    event_type: privesc
    condition:
      field: caps
      op: caps_gained
      values:
        - CAP_NET_ADMIN
    severity: warning
    action: alert
    tags: [mitre:T1548.002, privesc, network, lateral-movement]

  # CAP_SYS_CHROOT allows chroot() to any directory — a container escape vector.
  - id: privesc_sys_chroot_gained
    name: "CAP_SYS_CHROOT gained at runtime"
    description: >
      A process gained CAP_SYS_CHROOT, allowing unrestricted chroot calls.
      Combined with a mount or pivot_root this is a container filesystem
      escape vector. Should never be gained at runtime in hardened deployments.
    event_type: privesc
    condition:
      field: caps
      op: caps_gained
      values:
        - CAP_SYS_CHROOT
    severity: warning
    action: alert
    tags: [mitre:T1548.002, mitre:T1611, privesc, chroot, container-escape]

  # ============================================================================
  # T1611 — Escape to Host: Namespace Escape via setns / unshare
  # ============================================================================

  # setns(2) enters an existing namespace (pid, net, mnt, uts, ipc, user).
  # Calling setns to join another process's namespaces (particularly the init
  # process's network/mnt namespace) is a container escape primitive.
  - id: privesc_setns_syscall
    name: "Privilege Escalation: setns syscall (namespace entry)"
    description: >
      A process called setns(2) to enter another namespace. In containerised
      environments, entering the host's mount or network namespace (by joining
      PID 1's namespaces) is the core step of a T1611 container escape attempt.
      Legitimate callers include nsenter and container runtime shims.
    event_type: syscall
    condition:
      field: nr
      op: in
      values: ["308"]   # __NR_setns (x86-64)
    severity: critical
    action: alert
    tags: [mitre:T1611, mitre:T1548.002, privesc, setns, namespace-escape, container-escape]

  # unshare(2) creates new namespaces for the calling process.  Creating a new
  # user namespace (CLONE_NEWUSER) gives the process root inside it — enabling
  # privilege escalation via nested user namespaces.
  - id: privesc_unshare_user_ns
    name: "Privilege Escalation: unshare syscall (new user namespace)"
    description: >
      A process called unshare(2) to create new namespaces. Creating a user
      namespace (CLONE_NEWUSER) with CLONE_NEWNS allows mounting arbitrary
      filesystems inside the new namespace and is the basis of several CVE-
      class container escapes (CVE-2019-5736, CVE-2022-0492). Legitimate
      use is restricted to container runtime setup only.
    event_type: syscall
    condition:
      field: nr
      op: in
      values: ["272"]   # __NR_unshare (x86-64)
    severity: warning
    action: alert
    tags: [mitre:T1611, mitre:T1548.002, privesc, unshare, user-namespace, container-escape]

  # ============================================================================
  # T1548.001 — SUID Binary Abuse
  # ============================================================================

  # SUID binaries execute as their owner (often root) regardless of the caller's
  # UID. Executing SUID binaries not in the known-good list from suspicious
  # parent processes is a T1548.001 escalation pattern.
  - id: privesc_suid_suspicious_path
    name: "Privilege Escalation: SUID binary executed from suspicious path"
    description: >
      A SUID binary was executed from a path outside the standard system
      directories (/usr/bin, /bin, /usr/sbin). SUID binaries in /tmp, /dev/shm,
      /var/tmp, or user-writable directories are almost always malicious:
      an attacker planted a SUID root helper to achieve T1548.001 escalation.
    event_type: file
    condition:
      field: filename
      op: regex
      values:
        - "/tmp/[^/]+"
        - "/var/tmp/[^/]+"
        - "/dev/shm/[^/]+"
        - "/home/[^/]+/[^/]+"
        - "/run/user/[0-9]+/[^/]+"
    severity: critical
    action: alert
    tags: [mitre:T1548.001, privesc, suid, filesystem-escape]

  # ============================================================================
  # cgroup v2 escape — writing notify_on_release (T1611)
  # ============================================================================

  # The cgroup notify_on_release file executes the release_agent script when
  # a cgroup becomes empty. Writing to this file from inside a container (or
  # writing to release_agent) is the root-level cgroup escape technique
  # (CVE-2022-0492 class).
  - id: privesc_cgroup_notify_on_release
    name: "Privilege Escalation: cgroup notify_on_release write (T1611)"
    description: >
      A process wrote to a cgroup notify_on_release or release_agent file.
      This is the core mechanism of the cgroup v1/v2 container escape: a
      process migrates to a cgroup, enables notification, triggers an empty
      cgroup, and the release_agent runs on the host with root privileges.
      Corresponds to CVE-2022-0492 and related cgroup escape CVEs.
    event_type: file
    condition:
      field: filename
      op: regex
      values:
        - "/sys/fs/cgroup/.*/notify_on_release"
        - "/sys/fs/cgroup/.*/release_agent"
    severity: critical
    action: block
    tags: [mitre:T1611, privesc, cgroup, cgroup-escape, container-escape, cve]
