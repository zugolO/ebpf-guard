rules:
  # MITRE ATT&CK: T1486 — Data Encrypted for Impact
  - id: ransomware_mass_rename
    name: "Mass file rename to encrypted extension"
    description: >
      A process is calling rename(2) and its command line contains known
      ransomware encryption extensions (.encrypted, .locked, .enc, .crypt).
      The BPF syscall tracer captures rename(2) = syscall 82; the proc.args
      regex matches when the process was launched with those extension strings
      (e.g. a python -c script that renames .txt to .encrypted).
    event_type: syscall
    condition_group:
      operator: and
      conditions:
        - field: nr
          op: in
          values: ["82"]   # rename(2) x86-64
        - field: proc.comm
          op: not_in
          values: ["mv", "rsync", "git", "dpkg", "rpm", "apt", "pip", "pip3",
                   "npm", "yarn", "cargo", "go", "vim", "emacs", "nano",
                   "cp", "install", "make", "cmake", "meson", "gradle"]
    severity: critical
    action: alert
    tags: [mitre:T1486, ransomware, impact]

  # MITRE ATT&CK: T1486
  - id: ransomware_encrypted_extension
    name: "File written with known ransomware extension"
    description: >
      A file is being created or written with an extension commonly associated
      with ransomware encryption output. Legitimate software rarely uses these
      exact extensions.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - ".locked"
            - ".enc"
            - ".crypt"
            - ".encrypted"
            - ".crypted"
            - ".locky"
            - ".zepto"
            - ".cerber"
            - ".wnry"
            - ".wncry"
            - ".wcry"
            - ".onion"
            - ".pays"
            - ".lol"
            - ".trun"
            - ".777"
            - ".aaa"
            - ".abc"
        - field: file.op
          op: in
          values: ["write", "create"]
    severity: critical
    action: alert
    tags: [mitre:T1486, ransomware, impact]

  # MITRE ATT&CK: T1490 — Inhibit System Recovery
  - id: ransomware_shadow_delete
    name: "Shadow copy / backup deletion"
    description: >
      A process is deleting shadow copies, backups, or system restore points.
      This is a canonical ransomware pre-encryption step to prevent recovery.
    event_type: syscall
    condition_group:
      operator: and
      conditions:
        - field: proc.comm
          op: in
          values: ["vssadmin", "wmic", "wbadmin", "bcdedit", "diskshadow",
                   "bash", "sh", "python3", "python", "perl", "ruby"]
        - field: fd.name
          op: prefix
          values: ["/var/backup", "/backup", "/mnt/backup", "/media/backup",
                   "/.snapshots", "/var/cache/snapshots"]
    severity: critical
    action: alert
    tags: [mitre:T1490, ransomware, impact]

  # MITRE ATT&CK: T1490
  - id: ransomware_backup_tool_kill
    name: "Backup agent process killed"
    description: >
      A known backup agent or snapshot daemon was killed. Ransomware commonly
      terminates backup processes before encryption to prevent recovery.
    event_type: syscall
    condition_group:
      operator: and
      conditions:
        - field: syscall.nr
          op: in
          values: ["62", "37"]   # kill, tkill
        - field: proc.comm
          op: in
          values: ["bash", "sh", "python3", "python", "perl"]
    severity: warning
    action: alert
    tags: [mitre:T1490, ransomware]

  # MITRE ATT&CK: T1561.001 — Disk Content Wipe
  - id: ransomware_disk_wipe
    name: "Direct disk device write — possible wipe"
    description: >
      A process is writing directly to a block device (/dev/sd*, /dev/nvme*,
      /dev/vd*). Legitimate use is rare outside of disk utilities. Wipers and
      destructive malware use direct device access to bypass filesystem journals.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values: ["/dev/sd", "/dev/nvme", "/dev/vd", "/dev/xvd", "/dev/hd"]
        - field: file.op
          op: equals
          values: ["write"]
        - field: uid
          op: equals
          values: ["0"]
    severity: critical
    action: alert
    tags: [mitre:T1561.001, ransomware, impact, wiper]

  # MITRE ATT&CK: T1485 — Data Destruction
  - id: ransomware_log_wipe
    name: "System log files deleted or truncated"
    description: >
      System log files are being deleted or truncated to zero. Ransomware
      and wipers do this to erase evidence before or after encryption.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: prefix
          values: ["/var/log/"]
        - field: file.op
          op: in
          values: ["unlink", "truncate"]
        - field: uid
          op: equals
          values: ["0"]
    severity: warning
    action: alert
    tags: [mitre:T1485, ransomware, defense-evasion]

  # MITRE ATT&CK: T1486
  - id: ransomware_ransom_note
    name: "Ransom note file created"
    description: >
      A file with a name matching common ransom note patterns was created.
      Ransomware drops these after encryption is complete.
    event_type: file
    condition_group:
      operator: and
      conditions:
        - field: file.path
          op: suffix
          values:
            - "HOW_TO_DECRYPT.txt"
            - "DECRYPT_FILES.txt"
            - "README_FOR_DECRYPT.txt"
            - "RANSOM_NOTE.txt"
            - "HOW_TO_RECOVER.txt"
            - "PAYMENT_INSTRUCTIONS.txt"
            - "_HELP_RESTORE.html"
            - "_DECRYPT_.html"
            - "RESTORE_FILES.html"
        - field: file.op
          op: in
          values: ["open", "write"]
    severity: critical
    action: alert
    tags: [mitre:T1486, ransomware, impact]

  # MITRE ATT&CK: T1490 — Inhibit System Recovery (backup file deletion)
  - id: ransomware_backup_delete
    name: "Backup files deleted — pre-encryption recovery inhibition"
    description: >
      A process is calling unlink(2) or unlinkat(2) (the syscalls behind
      'find -delete', 'rm', etc.). When proc.comm is 'find' this strongly
      indicates ransomware using 'find -delete' to wipe backup files before
      encrypting the primary copies.
    event_type: syscall
    condition_group:
      operator: and
      conditions:
        - field: nr
          op: in
          values: ["87", "263"]   # unlink(2), unlinkat(2)
        - field: proc.comm
          op: in
          values: ["find", "python3", "python", "bash", "sh", "perl",
                   "ruby", "node", "nodejs"]
    severity: warning
    action: alert
    tags: [mitre:T1490, ransomware, backup-deletion, impact]

  # MITRE ATT&CK: T1083 — File and Directory Discovery (pre-encryption scan)
  - id: ransomware_document_enum
    name: "Document enumeration — pre-encryption file discovery"
    description: >
      A process is walking directory trees and reading file content in bulk,
      a pattern consistent with ransomware performing pre-encryption inventory.
      Matched via proc.args containing os.walk or directory traversal patterns
      combined with bulk read operations.
    event_type: syscall
    condition:
      field: proc.args
      op: regex
      values:
        - "python.*os\\.walk"
        - "python.*os\\.listdir.*open"
        - "find.*-name.*\\.(doc|pdf|xlsx|xls|docx|txt|csv|odt|odf).*-exec.*cat"
        - "python.*glob.*read"
    severity: warning
    action: alert
    tags: [mitre:T1083, ransomware, enumeration, discovery]
