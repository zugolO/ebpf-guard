suite: credential_access
rules_path: ../../rules/credential-access.yaml
tests:
  # ── AWS credentials ────────────────────────────────────────────────────────
  - name: "unexpected process reading ~/.aws/credentials fires cred_aws_credentials_read"
    rule_id: cred_aws_credentials_read
    event:
      type: file
      comm: malware
      file:
        filename: "/root/.aws/credentials"
        op: read
    expect: alert
    expect_severity: warning

  - name: "reading ~/.aws/config fires cred_aws_credentials_read"
    rule_id: cred_aws_credentials_read
    event:
      type: file
      comm: curl
      file:
        filename: "/home/ubuntu/.aws/config"
        op: open
    expect: alert

  - name: "aws CLI reading ~/.aws/credentials does not fire (allowlisted)"
    event:
      type: file
      comm: aws
      file:
        filename: "/root/.aws/credentials"
        op: read
    expect: no_alert

  # ── GCP service account ────────────────────────────────────────────────────
  - name: "unexpected process reading GCP key fires cred_gcp_service_account_read"
    rule_id: cred_gcp_service_account_read
    event:
      type: file
      comm: malware
      file:
        filename: "/etc/gcp/service-account.json"
        op: read
    expect: alert
    expect_severity: warning

  - name: "reading from /etc/google/ fires cred_gcp_service_account_read"
    rule_id: cred_gcp_service_account_read
    event:
      type: file
      comm: nc
      file:
        filename: "/etc/google/application_default_credentials.json"
        op: open
    expect: alert

  # ── SSH private keys ───────────────────────────────────────────────────────
  - name: "unexpected process reading /id_rsa fires cred_ssh_private_key_read"
    rule_id: cred_ssh_private_key_read
    event:
      type: file
      comm: malware
      file:
        filename: "/root/.ssh/id_rsa"
        op: read
    expect: alert
    expect_severity: warning

  - name: "reading id_ed25519 fires cred_ssh_private_key_read"
    rule_id: cred_ssh_private_key_read
    event:
      type: file
      comm: python3
      file:
        filename: "/home/user/.ssh/id_ed25519"
        op: open
    expect: alert

  - name: "ssh itself reading id_rsa does not fire (allowlisted)"
    event:
      type: file
      comm: ssh
      file:
        filename: "/root/.ssh/id_rsa"
        op: read
    expect: no_alert

  - name: "git reading id_rsa does not fire (allowlisted)"
    event:
      type: file
      comm: git
      file:
        filename: "/home/user/.ssh/id_rsa"
        op: read
    expect: no_alert

  # ── /etc/shadow ────────────────────────────────────────────────────────────
  - name: "unexpected process reading /etc/shadow fires cred_shadow_read"
    rule_id: cred_shadow_read
    event:
      type: file
      comm: malware
      file:
        filename: "/etc/shadow"
        op: read
    expect: alert
    expect_severity: critical

  - name: "reading /etc/shadow again fires cred_shadow_read"
    rule_id: cred_shadow_read
    event:
      type: file
      comm: python3
      file:
        filename: "/etc/shadow"
        op: open
    expect: alert

  # ── Negative cases ─────────────────────────────────────────────────────────
  - name: "reading /etc/passwd does not fire shadow rule"
    event:
      type: file
      comm: id
      file:
        filename: "/etc/passwd"
        op: read
    expect: no_alert

  - name: "reading a regular file does not fire any credential rule"
    event:
      type: file
      comm: cat
      file:
        filename: "/etc/hosts"
        op: read
    expect: no_alert
