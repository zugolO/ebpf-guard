suite: cryptominer
rules_path: ../../rules/cryptominer.yaml
tests:
  - name: "connection to stratum port 3333 fires cryptominer_pool_ports"
    rule_id: cryptominer_pool_ports
    event:
      type: network
      network:
        dst_ip: "185.220.101.45"
        dport: 3333
    expect: alert
    expect_severity: critical

  - name: "connection to mining port 4444 fires cryptominer_pool_ports"
    rule_id: cryptominer_pool_ports
    event:
      type: network
      network:
        dst_ip: "1.2.3.4"
        dport: 4444
    expect: alert
    expect_severity: critical

  - name: "connection to standard HTTPS port (443) does not fire mining rule"
    event:
      type: network
      network:
        dst_ip: "93.184.216.34"
        dport: 443
    expect: no_alert

  - name: "DNS query to pool.supportxmr.com fires cryptominer_dns_pool"
    rule_id: cryptominer_dns_pool
    event:
      type: dns
      dns:
        qname: "pool.supportxmr.com"
        qtype: 1
    expect: alert
    expect_severity: critical

  - name: "DNS query to monerohash.com fires cryptominer_dns_pool"
    rule_id: cryptominer_dns_pool
    event:
      type: dns
      dns:
        qname: "monerohash.com"
        qtype: 1
    expect: alert

  - name: "DNS query to google.com does not fire any miner rule"
    event:
      type: dns
      dns:
        qname: "google.com"
        qtype: 1
    expect: no_alert
